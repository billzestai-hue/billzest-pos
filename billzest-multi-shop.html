<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>BillZest Multi-Shop POS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b;}
:root{--p:#7c3aed;--pd:#5b21b6;--pl:#ede9fe;--org:#f59e0b;--grn:#10b981;--red:#ef4444;--teal:#14b8a6;--bdr:#e2e8f0;}
.loading{position:fixed;inset:0;background:white;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px;}
.loading-spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.app{display:none;}
.app-header{background:white;border-bottom:1px solid var(--bdr);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent;}
.shop-selector{background:#f8fafc;border:1px solid var(--bdr);border-radius:40px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;}
.user-area{display:flex;align-items:center;gap:12px;}
.btn-logout{background:transparent;border:1px solid var(--bdr);padding:6px 12px;border-radius:30px;cursor:pointer;}
.content{padding:24px;max-width:1200px;margin:0 auto;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px;}
.shop-card{background:white;border-radius:20px;border:1px solid var(--bdr);padding:20px;transition:0.2s;cursor:pointer;}
.shop-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.08);}
.shop-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.shop-type{font-size:13px;color:#64748b;margin-bottom:12px;}
.shop-actions{display:flex;gap:8px;margin-top:12px;}
.btn-icon{background:transparent;border:none;cursor:pointer;font-size:16px;padding:4px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;}
.modal-content{background:white;border-radius:24px;padding:24px;width:90%;max-width:500px;}
.modal input,.modal select{width:100%;padding:12px;border:1px solid var(--bdr);border-radius:12px;margin-bottom:16px;}
.modal-buttons{display:flex;gap:12px;justify-content:flex-end;}
.btn-primary{background:var(--p);color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;}
.btn-secondary{background:#f1f5f9;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;}
.dashboard{display:none;}
.shop-dashboard-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.back-btn{background:transparent;border:none;color:var(--p);cursor:pointer;font-weight:600;}
.dashboard-actions{display:flex;gap:12px;flex-wrap:wrap;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px;}
.stat-card{background:white;border-radius:20px;padding:20px;border:1px solid var(--bdr);}
.stat-icon{font-size:28px;margin-bottom:12px;}
.stat-val{font-size:28px;font-weight:800;}
.stat-lbl{font-size:13px;color:#64748b;}
.section{background:white;border-radius:20px;border:1px solid var(--bdr);margin-bottom:24px;overflow:hidden;}
.section-hdr{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;}
.section-title{font-size:16px;font-weight:700;}
.section-body{padding:16px 20px;}
.actions-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.action-btn{background:#f8fafc;border:1px solid var(--bdr);border-radius:16px;padding:12px;text-align:center;cursor:pointer;}
.action-btn:hover{background:var(--pl);border-color:var(--p);}
.ab-icon{font-size:24px;margin-bottom:4px;}
.ab-label{font-size:12px;font-weight:600;}
.pos-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-bottom:20px;}
.pos-item-card{background:#f8fafc;border:1px solid var(--bdr);border-radius:12px;padding:10px;text-align:center;cursor:pointer;}
.pos-item-card:hover{background:var(--pl);}
.pos-item-name{font-size:13px;font-weight:600;}
.pos-item-price{font-size:12px;color:var(--p);}
.cart-items{background:#f8fafc;border-radius:16px;padding:12px;max-height:300px;overflow-y:auto;}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);}
.cart-item-qty{display:flex;align-items:center;gap:8px;}
.qty-btn{background:white;border:1px solid var(--bdr);width:26px;height:26px;border-radius:6px;cursor:pointer;}
.btn-checkout{background:var(--grn);color:white;border:none;padding:12px;border-radius:40px;font-weight:700;width:100%;cursor:pointer;margin-top:12px;}
.add-product-form{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.add-product-form input,.add-product-form select{padding:10px;border:1px solid var(--bdr);border-radius:12px;flex:1;}
.branding-preview{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:16px;background:#f8fafc;border-radius:16px;}
.brand-logo-preview{width:60px;height:60px;border-radius:12px;background:white;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr);}
.btn-brand-save{background:var(--p);color:white;border:none;padding:12px;border-radius:40px;cursor:pointer;width:100%;font-weight:600;}
canvas{max-height:200px;width:100%;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:white;padding:8px 20px;border-radius:40px;font-size:12px;z-index:9999;transition:0.3s;}
.toast.show{transform:translateX(-50%) translateY(0);}
.page{display:none;}
.page.on{display:block;}
@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .actions-grid{grid-template-columns:repeat(2,1fr);}
  .app-header{flex-direction:column;height:auto;gap:8px;padding:12px;}
}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div>BillZest Multi-Shop</div>
</div>

<div class="app" id="mainApp">
  <div class="app-header">
    <div class="logo">BillZest POS</div>
    <select id="shopSelector" class="shop-selector" onchange="switchShop()">
      <option value="">-- Select Shop --</option>
    </select>
    <div class="user-area">
      <span id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>
  <div class="content">
    <!-- Shop List View -->
    <div id="shopListView">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2>My Shops</h2>
        <button class="btn-primary" onclick="openShopModal()">+ Add New Shop</button>
      </div>
      <div id="shopList" class="shop-grid">Loading shops...</div>
    </div>

    <!-- Shop Dashboard View -->
    <div id="dashboardView" class="dashboard">
      <div class="shop-dashboard-header">
        <button class="back-btn" onclick="backToShopList()">← Back to Shops</button>
        <div class="dashboard-actions">
          <button class="action-btn" onclick="switchDashboardPage('pagePOS')"><div class="ab-icon">🛒</div><div class="ab-label">POS</div></button>
          <button class="action-btn" onclick="switchDashboardPage('pageProducts')"><div class="ab-icon">📦</div><div class="ab-label">Products</div></button>
          <button class="action-btn" onclick="switchDashboardPage('pageReports')"><div class="ab-icon">📊</div><div class="ab-label">Reports</div></button>
          <button class="action-btn" onclick="switchDashboardPage('pageBranding')"><div class="ab-icon">🏷️</div><div class="ab-label">Branding</div></button>
        </div>
        <h2 id="dashboardShopName"></h2>
      </div>
      <div id="dashboardContent">Loading dashboard...</div>
    </div>
  </div>
</div>

<!-- Modal for Add/Edit Shop -->
<div id="shopModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add New Shop</h3>
    <input type="text" id="shopName" placeholder="Shop Name" autocomplete="off">
    <select id="shopType">
      <option value="coffee">☕ Coffee Shop</option>
      <option value="restaurant">🍽️ Restaurant</option>
      <option value="grocery">🛒 Grocery</option>
      <option value="electronics">📱 Electronics</option>
      <option value="hotel">🏨 Hotel</option>
      <option value="retail">🛍️ Retail</option>
    </select>
    <input type="text" id="shopPhone" placeholder="Phone">
    <input type="text" id="shopAddress" placeholder="Address">
    <input type="hidden" id="shopId">
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeShopModal()">Cancel</button>
      <button class="btn-primary" onclick="saveShop()">Save</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, addDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCN0akvFXOHM6WPHv9ve9noqqmauO3TJRY",
  authDomain: "billzest-pos.firebaseapp.com",
  projectId: "billzest-pos",
  storageBucket: "billzest-pos.firebasestorage.app",
  messagingSenderId: "946546876429",
  appId: "1:946546876429:web:9b4a7aa3cecbf3aea83544"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let shops = [];
let currentShopId = null;
let currentShopData = { products: [], orders: [], brand: {} };
let dashboardPage = 'home'; // home, pos, products, reports, branding
let cart = [];

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

// Load shops for current user
async function loadShops() {
  if (!currentUser) return;
  const q = query(collection(db, "shops"), where("ownerId", "==", currentUser.uid));
  const snap = await getDocs(q);
  shops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderShopList();
  renderShopSelector();
}
function renderShopList() {
  const container = document.getElementById('shopList');
  if (!container) return;
  if (shops.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;">No shops yet. Click "Add New Shop" to create.</div>'; return; }
  container.innerHTML = shops.map(shop => `
    <div class="shop-card" onclick="openShopDashboard('${shop.id}')">
      <div class="shop-name">${escapeHtml(shop.name)}</div>
      <div class="shop-type">${shop.type || 'General'}</div>
      <div class="shop-address">${shop.address || ''}</div>
      <div class="shop-actions">
        <button class="btn-icon" onclick="event.stopPropagation(); editShop('${shop.id}','${escapeHtml(shop.name)}','${shop.type}','${shop.phone||''}','${escapeHtml(shop.address||'')}')">✏️</button>
        <button class="btn-icon" onclick="event.stopPropagation(); deleteShop('${shop.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}
function renderShopSelector() {
  const sel = document.getElementById('shopSelector');
  sel.innerHTML = '<option value="">-- Select Shop --</option>' + shops.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
}
function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// Shop CRUD
window.openShopModal = (editMode = false) => {
  document.getElementById('modalTitle').innerText = editMode ? 'Edit Shop' : 'Add New Shop';
  document.getElementById('shopModal').style.display = 'flex';
};
window.closeShopModal = () => {
  document.getElementById('shopModal').style.display = 'none';
  document.getElementById('shopId').value = '';
  document.getElementById('shopName').value = '';
  document.getElementById('shopType').value = 'coffee';
  document.getElementById('shopPhone').value = '';
  document.getElementById('shopAddress').value = '';
};
window.saveShop = async () => {
  const id = document.getElementById('shopId').value;
  const name = document.getElementById('shopName').value.trim();
  const type = document.getElementById('shopType').value;
  const phone = document.getElementById('shopPhone').value.trim();
  const address = document.getElementById('shopAddress').value.trim();
  if (!name) { showToast('Enter shop name'); return; }
  const data = { name, type, phone, address, ownerId: currentUser.uid, updatedAt: new Date().toISOString() };
  if (id) {
    await updateDoc(doc(db, "shops", id), data);
    showToast('Shop updated');
  } else {
    await addDoc(collection(db, "shops"), { ...data, createdAt: new Date().toISOString() });
    showToast('Shop added');
  }
  closeShopModal();
  await loadShops();
};
window.editShop = (id, name, type, phone, address) => {
  document.getElementById('shopId').value = id;
  document.getElementById('shopName').value = name;
  document.getElementById('shopType').value = type;
  document.getElementById('shopPhone').value = phone;
  document.getElementById('shopAddress').value = address;
  openShopModal(true);
};
window.deleteShop = async (id) => {
  if (confirm('Delete this shop? All its data will be lost.')) {
    await deleteDoc(doc(db, "shops", id));
    showToast('Shop deleted');
    await loadShops();
    if (currentShopId === id) backToShopList();
  }
};

// Dashboard for selected shop
window.openShopDashboard = async (shopId) => {
  currentShopId = shopId;
  document.getElementById('shopListView').style.display = 'none';
  document.getElementById('dashboardView').style.display = 'block';
  document.getElementById('dashboardShopName').innerHTML = shops.find(s => s.id === shopId)?.name || 'Shop Dashboard';
  await loadShopDashboard(shopId);
};
window.backToShopList = () => {
  currentShopId = null;
  document.getElementById('shopListView').style.display = 'block';
  document.getElementById('dashboardView').style.display = 'none';
};
window.switchShop = () => {
  const sel = document.getElementById('shopSelector');
  const shopId = sel.value;
  if (shopId) openShopDashboard(shopId);
  else backToShopList();
};

window.switchDashboardPage = (page) => {
  dashboardPage = page;
  renderDashboardPage();
};
function renderDashboardPage() {
  const container = document.getElementById('dashboardContent');
  if (!container) return;
  const data = currentShopData;
  if (dashboardPage === 'home') renderHome(container, data);
  else if (dashboardPage === 'pos') renderPOS(container, data);
  else if (dashboardPage === 'products') renderProducts(container, data);
  else if (dashboardPage === 'reports') renderReports(container, data);
  else if (dashboardPage === 'branding') renderBranding(container, data);
}

function renderHome(container, data) {
  const today = new Date().toISOString().split('T')[0];
  let todaySales = 0;
  data.orders.forEach(o => { if (o.date.split('T')[0] === today) todaySales += o.total || 0; });
  const lowStock = data.products.filter(p => (p.stock||0) < 10);
  const recent = [...data.orders].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const productSales = {};
  data.orders.forEach(o => { o.items?.forEach(i => { productSales[i.name] = (productSales[i.name]||0) + i.qty; }); });
  const top = Object.entries(productSales).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const daily = {};
  for (let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); daily[d.toISOString().split('T')[0]] = 0; }
  data.orders.forEach(o => { const date = o.date.split('T')[0]; if (daily[date]!==undefined) daily[date] += o.total||0; });
  const labels = Object.keys(daily).map(d => new Date(d).toLocaleDateString(undefined, {month:'short',day:'numeric'}));
  const chartData = Object.values(daily);
  setTimeout(() => {
    const ctx = document.getElementById('homeChart')?.getContext('2d');
    if (ctx) { if (window.homeChart) window.homeChart.destroy(); window.homeChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Sales (SAR)', data: chartData, borderColor: '#7c3aed', tension: 0.3, fill: true }] } }); }
  }, 50);
  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val">﷼${todaySales}</div><div class="stat-lbl">Today's Sales</div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-val">${data.products.length}</div><div class="stat-lbl">Products</div></div>
      <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-val">${lowStock.length}</div><div class="stat-lbl">Low Stock</div></div>
      <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-val">4.9</div><div class="stat-lbl">Rating</div></div>
    </div>
    <div class="section"><div class="section-hdr"><div class="section-title">🕒 Recent Orders</div></div><div class="section-body">${recent.length ? `<table class="orders-table" style="width:100%;"><thead><tr><th>Order ID</th><th>Amount</th><th>Date</th></tr></thead><tbody>${recent.map(o => `<tr><td>#${o.id.slice(-6)}</td><td>﷼${o.total}</td><td>${new Date(o.date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>` : '<div>No orders yet</div>'}</div></div>
    <div class="stats-grid" style="grid-template-columns:1fr 1fr;">
      <div class="section"><div class="section-hdr"><div class="section-title">⚠️ Low Stock</div></div><div class="section-body">${lowStock.length ? lowStock.map(p => `<div style="display:flex;justify-content:space-between;"><span>${p.name}</span><span>Stock: ${p.stock}</span></div>`).join('') : 'All good'}</div></div>
      <div class="section"><div class="section-hdr"><div class="section-title">🏆 Top Selling</div></div><div class="section-body">${top.length ? top.map(([name,qty]) => `<div style="display:flex;justify-content:space-between;"><span>${name}</span><span>${qty} sold</span></div>`).join('') : 'No sales yet'}</div></div>
    </div>
    <div class="section"><div class="section-hdr"><div class="section-title">📈 Sales Trend (7 days)</div></div><div class="section-body"><canvas id="homeChart" style="max-height:200px;"></canvas></div></div>
  `;
}
function renderPOS(container, data) {
  cart = cart.filter(c => data.products.some(p => p.id === c.id));
  const renderPosItems = () => {
    const itemsDiv = document.getElementById('posItemsList');
    if (itemsDiv) itemsDiv.innerHTML = data.products.map(p => `<div class="pos-item-card" onclick="addToCartPos('${p.id}','${escapeHtml(p.name)}',${p.price})"><div class="pos-item-name">${escapeHtml(p.name)}</div><div class="pos-item-price">﷼${p.price}</div></div>`).join('');
  };
  const renderCartItems = () => {
    const cartDiv = document.getElementById('cartItems');
    const totalSpan = document.getElementById('cartTotal');
    if (!cartDiv) return;
    if (cart.length === 0) { cartDiv.innerHTML = '<div style="text-align:center;color:#94a3b8;">Cart empty</div>'; if(totalSpan) totalSpan.innerText = 'Total: ﷼0'; return; }
    let html = '', total = 0;
    cart.forEach((item, idx) => {
      total += item.price * item.qty;
      html += `<div class="cart-item"><div class="cart-item-name">${escapeHtml(item.name)}</div><div><div class="cart-item-qty"><button class="qty-btn" onclick="updateCartQty(${idx},-1)">-</button><span>${item.qty}</span><button class="qty-btn" onclick="updateCartQty(${idx},1)">+</button></div></div><div>﷼${item.price * item.qty}</div></div>`;
    });
    cartDiv.innerHTML = html;
    if(totalSpan) totalSpan.innerText = `Total: ﷼${total}`;
  };
  container.innerHTML = `
    <div class="pos-items" id="posItemsList"></div>
    <div class="cart-items" id="cartItems">Cart empty</div>
    <div class="cart-total" id="cartTotal" style="text-align:right;font-weight:800;margin:10px 0;">Total: ﷼0</div>
    <button class="btn-checkout" id="checkoutBtnPos">✅ Complete Order</button>
  `;
  renderPosItems();
  renderCartItems();
  document.getElementById('checkoutBtnPos')?.addEventListener('click', async () => {
    if (cart.length === 0) { showToast('Cart empty'); return; }
    const total = cart.reduce((s,i)=>s+(i.price*i.qty),0);
    const ordersRef = collection(db, "shops", currentShopId, "orders");
    await addDoc(ordersRef, { userId: currentUser.uid, items: cart, total, date: new Date().toISOString(), status: 'completed' });
    for (let item of cart) {
      const prod = data.products.find(p=>p.id===item.id);
      if (prod) {
        const prodRef = doc(db, "shops", currentShopId, "products", item.id);
        await updateDoc(prodRef, { stock: (prod.stock||0) - item.qty });
      }
    }
    showToast(`✅ Order placed! Total: ﷼${total}`);
    cart = [];
    await loadShopDashboard(currentShopId);
  });
  window.addToCartPos = (id, name, price) => {
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty++;
    else cart.push({ id, name, price, qty: 1 });
    renderCartItems();
  };
  window.updateCartQty = (idx, delta) => {
    const newQty = cart[idx].qty + delta;
    if (newQty <= 0) cart.splice(idx,1);
    else cart[idx].qty = newQty;
    renderCartItems();
  };
}
function renderProducts(container, data) {
  const renderList = () => {
    const listDiv = document.getElementById('productsListDiv');
    if (listDiv) listDiv.innerHTML = data.products.map(p => `<div class="product-item"><div><strong>${escapeHtml(p.name)}</strong> (${p.category}) - ﷼${p.price} | Stock: ${p.stock}</div><div><button onclick="editProductFromList('${p.id}','${escapeHtml(p.name)}',${p.price})">✏️</button><button onclick="deleteProductFromList('${p.id}')">🗑️</button></div></div>`).join('');
  };
  container.innerHTML = `
    <div class="add-product-form">
      <input type="text" id="newProdName" placeholder="Product name">
      <input type="number" id="newProdPrice" placeholder="Price">
      <select id="newProdCat"><option value="Coffee">Coffee</option><option value="Tea">Tea</option><option value="Cold Drinks">Cold Drinks</option><option value="Food">Food</option><option value="Pastry">Pastry</option><option value="Add-ons">Add-ons</option></select>
      <input type="number" id="newProdStock" placeholder="Stock" value="50">
      <button class="btn-primary" id="addProductBtn">➕ Add</button>
    </div>
    <div id="productsListDiv"></div>
  `;
  renderList();
  document.getElementById('addProductBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('newProdName').value.trim();
    const price = parseFloat(document.getElementById('newProdPrice').value);
    const category = document.getElementById('newProdCat').value;
    const stock = parseInt(document.getElementById('newProdStock').value) || 0;
    if (!name || isNaN(price)) { showToast('Enter name and price'); return; }
    const prodRef = collection(db, "shops", currentShopId, "products");
    await addDoc(prodRef, { name, price, category, stock });
    showToast('Product added');
    await loadShopDashboard(currentShopId);
  });
  window.editProductFromList = async (id, oldName, oldPrice) => {
    const newName = prompt('New name', oldName);
    const newPrice = prompt('New price', oldPrice);
    if (newName && newPrice) {
      const prodRef = doc(db, "shops", currentShopId, "products", id);
      await updateDoc(prodRef, { name: newName, price: parseFloat(newPrice) });
      await loadShopDashboard(currentShopId);
    }
  };
  window.deleteProductFromList = async (id) => {
    if (confirm('Delete this product?')) {
      await deleteDoc(doc(db, "shops", currentShopId, "products", id));
      await loadShopDashboard(currentShopId);
    }
  };
}
function renderReports(container, data) {
  const daily = {};
  for (let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); daily[d.toISOString().split('T')[0]] = 0; }
  data.orders.forEach(o => { const date = o.date.split('T')[0]; if (daily[date]!==undefined) daily[date] += o.total||0; });
  const labels = Object.keys(daily).map(d => new Date(d).toLocaleDateString(undefined, {month:'short',day:'numeric'}));
  const chartData = Object.values(daily);
  const total30 = Object.values(daily).reduce((a,b)=>a+b,0);
  setTimeout(() => {
    const ctx = document.getElementById('reportChart')?.getContext('2d');
    if (ctx) { if (window.reportChart) window.reportChart.destroy(); window.reportChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Sales (SAR)', data: chartData, backgroundColor: '#7c3aed' }] } }); }
  }, 50);
  container.innerHTML = `<canvas id="reportChart" style="max-height:200px;"></canvas><div style="margin-top:16px;text-align:center;"><strong>Total Revenue (30 days):</strong> <span style="font-size:20px;font-weight:800;color:var(--p);">﷼${total30}</span></div>`;
}
function renderBranding(container, data) {
  const brand = data.brand || { companyName: shops.find(s=>s.id===currentShopId)?.name || 'My Shop', logoBase64: '', bizType: 'coffee' };
  container.innerHTML = `
    <div class="branding-preview"><div class="brand-logo-preview" id="logoPreview">${brand.logoBase64 ? `<img src="${brand.logoBase64}" style="width:100%;height:100%;object-fit:cover;">` : '<span style="font-size:32px;">🏪</span>'}</div><div><h3 id="previewCompanyName">${escapeHtml(brand.companyName)}</h3><p id="previewBusinessType">${brand.bizType || 'coffee'}</p></div></div>
    <div><label for="companyNameInput">Company Name</label><input type="text" id="companyNameInput" value="${escapeHtml(brand.companyName)}" style="width:100%;padding:10px;border:1px solid var(--bdr);border-radius:12px;"></div>
    <div style="margin-top:12px;"><label for="companyBizTypeSelect">Business Type</label><select id="companyBizTypeSelect" style="width:100%;padding:10px;border:1px solid var(--bdr);border-radius:12px;"><option value="coffee" ${brand.bizType==='coffee'?'selected':''}>Coffee Shop</option><option value="restaurant" ${brand.bizType==='restaurant'?'selected':''}>Restaurant</option><option value="grocery" ${brand.bizType==='grocery'?'selected':''}>Grocery</option></select></div>
    <div style="margin-top:12px;"><label for="logoUpload">Logo</label><input type="file" id="logoUpload" accept="image/*"></div>
    <button class="btn-brand-save" id="saveBrandBtn">💾 Save Brand Settings</button>
  `;
  document.getElementById('saveBrandBtn')?.addEventListener('click', async () => {
    const newName = document.getElementById('companyNameInput').value.trim();
    const newType = document.getElementById('companyBizTypeSelect').value;
    if (!newName) { showToast('Enter company name'); return; }
    let logoBase64 = brand.logoBase64;
    const file = document.getElementById('logoUpload').files[0];
    if (file) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      await new Promise((resolve) => { reader.onload = () => { logoBase64 = reader.result; resolve(); }; });
    }
    const brandRef = doc(db, "shops", currentShopId, "brand");
    await setDoc(brandRef, { companyName: newName, logoBase64, bizType: newType });
    showToast('Brand saved');
    await loadShopDashboard(currentShopId);
  });
}

async function loadShopDashboard(shopId) {
  const productsRef = collection(db, "shops", shopId, "products");
  const ordersRef = collection(db, "shops", shopId, "orders");
  const brandRef = doc(db, "shops", shopId, "brand");
  const [productsSnap, ordersSnap, brandSnap] = await Promise.all([getDocs(productsRef), getDocs(ordersRef), getDoc(brandRef)]);
  let products = productsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const orders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const brand = brandSnap.exists() ? brandSnap.data() : null;
  if (products.length === 0) {
    const sample = getSampleProductsForType(shops.find(s=>s.id===shopId)?.type || 'coffee');
    for (let p of sample) await addDoc(collection(db, "shops", shopId, "products"), p);
    products = sample.map((p,i) => ({ id: 'temp'+i, ...p }));
  }
  currentShopData = { products, orders, brand };
  dashboardPage = 'home';
  renderDashboardPage();
}
function getSampleProductsForType(type) {
  if (type === 'coffee') return [{ name:"Arabic Coffee", price:12, category:"Coffee", stock:50 },{ name:"Latte", price:14, category:"Coffee", stock:30 },{ name:"Croissant", price:8, category:"Pastry", stock:20 }];
  if (type === 'grocery') return [{ name:"Rice 5kg", price:35, category:"Staples", stock:100 },{ name:"Milk 1L", price:7, category:"Dairy", stock:50 }];
  return [{ name:"Sample Product", price:10, category:"General", stock:100 }];
}

// Auth state
let authTimeout = setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; alert('Timeout. Redirect to login.'); window.location.href = 'index.html'; }, 8000);
onAuthStateChanged(auth, async (user) => {
  clearTimeout(authTimeout);
  document.getElementById('loadingScreen').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('userEmail').innerText = user.email;
    document.getElementById('mainApp').style.display = 'block';
    await loadShops();
  } else {
    window.location.href = 'index.html';
  }
});
document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
</script>
