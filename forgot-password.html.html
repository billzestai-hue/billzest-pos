<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - BillzestPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:white;border-radius:28px;padding:40px;max-width:450px;width:100%;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)}
        .logo{text-align:center;margin-bottom:30px;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#4f46e5,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo i{font-style:normal}
        h2{text-align:center;margin-bottom:10px;color:#1e293b}
        p{text-align:center;color:#64748b;margin-bottom:30px}
        .input-group{margin-bottom:20px}
        .input-group input{width:100%;padding:14px;border:1.5px solid #e2e8f0;border-radius:14px;font-size:1rem;transition:all 0.3s}
        .input-group input:focus{outline:none;border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#4f46e5,#ec4899);color:white;border:none;border-radius:14px;font-weight:600;cursor:pointer;transition:transform 0.3s}
        .btn:hover{transform:translateY(-2px)}
        .btn:disabled{opacity:0.7;cursor:not-allowed;transform:none}
        .back-link{text-align:center;margin-top:20px}
        .back-link a{color:#64748b;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
        .back-link a:hover{color:#4f46e5}
        .message{padding:12px;border-radius:12px;margin-bottom:20px;display:none;align-items:center;gap:10px}
        .message.success{background:#d1fae5;color:#065f46}
        .message.error{background:#fee2e2;color:#dc2626}
        .spinner{display:none;width:20px;height:20px;border:2px solid white;border-top:2px solid transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-left:10px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🏪 BillzestPOS</div>
        <h2>Forgot Password?</h2>
        <p>Enter your email address and we'll send you a reset link</p>
        <div class="message" id="messageDiv"></div>
        <form id="resetForm">
            <div class="input-group">
                <input type="email" id="resetEmail" placeholder="Email Address" required>
            </div>
            <button type="submit" class="btn" id="resetBtn">
                <span id="btnText">Send Reset Link</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>
        <div class="back-link">
            <a href="login.html"><i data-lucide="arrow-left" size="16"></i> Back to Login</a>
        </div>
        <div class="back-link" style="margin-top:10px">
            <a href="register.html">Don't have an account? Sign up</a>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCN0akvFXOHM6WPHv9ve9noqqmauO3TJRY",
            authDomain: "billzest-pos.firebaseapp.com",
            projectId: "billzest-pos",
            storageBucket: "billzest-pos.firebasestorage.app",
            messagingSenderId: "946546876429",
            appId: "1:946546876429:web:9b4a7aa3cecbf3aea83544",
            measurementId: "G-69WEHH9X5D"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const messageDiv = document.getElementById('messageDiv');
        
        function showMessage(text, isSuccess) {
            messageDiv.innerText = text;
            messageDiv.className = `message ${isSuccess ? 'success' : 'error'}`;
            messageDiv.style.display = 'flex';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }
        
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            
            resetBtn.disabled = true;
            btnText.innerText = 'Sending...';
            spinner.style.display = 'inline-block';
            
            try {
                await sendPasswordResetEmail(auth, email);
                showMessage(`✅ Password reset link sent to ${email}. Check your inbox!`, true);
                document.getElementById('resetEmail').value = '';
            } catch(error) {
                let errorMsg = error.message;
                if(error.code === 'auth/user-not-found') errorMsg = 'No account found with this email address';
                showMessage(`❌ ${errorMsg}`, false);
            } finally {
                resetBtn.disabled = false;
                btnText.innerText = 'Send Reset Link';
                spinner.style.display = 'none';
            }
        });
        
        lucide.createIcons();
    </script>
</body>
</html>
