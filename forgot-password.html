<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Billzestpos</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #ec4899; --dark: #0f172a; --text-gray: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .container { width: 100%; max-width: 480px; margin: 20px; background: white; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; }
        .brand-bar { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 30px; text-align: center; }
        .brand-bar .logo { font-size: 1.8rem; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .brand-bar .icon-wrap { background: rgba(255,255,255,0.2); width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .brand-bar p { color: rgba(255,255,255,0.85); margin-top: 8px; font-size: 0.95rem; }

        .form-area { padding: 40px; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #334155; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .form-control { width: 100%; padding: 14px 14px 14px 44px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background: #f8fafc; transition: all 0.3s; }
        .form-control:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }

        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 20px rgba(236,72,153,0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(236,72,153,0.3); }
        .btn-primary:disabled { opacity: 0.7; pointer-events: none; }

        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: var(--text-gray); text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; transition: color 0.3s; }
        .back-link a:hover { color: var(--primary); }

        /* Success State */
        .success-icon { width: 80px; height: 80px; background: rgba(16,185,129,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #10b981; }
        .success-title { text-align: center; font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
        .success-text { text-align: center; color: var(--text-gray); font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; }
        .success-email { color: var(--primary); font-weight: 700; }

        /* Error / Info message */
        .alert { padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 18px; display: none; }
        .alert.error { background: rgba(239,68,68,0.1); color: #dc2626; border: 1px solid rgba(239,68,68,0.2); }
        .alert.show { display: flex; align-items: center; gap: 8px; }

        @media (max-width: 500px) { .form-area { padding: 30px 24px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-bar">
            <div class="logo">
                <div class="icon-wrap"><i data-lucide="store" size="24"></i></div>
                Billzestpos
            </div>
            <p>Reset your account password</p>
        </div>

        <div class="form-area">
            <!-- Step 1: Enter Email -->
            <div class="step active" id="step-email">
                <h2 style="font-size:1.5rem; font-weight:800; color:#0f172a; margin-bottom:8px;">Forgot Password?</h2>
                <p style="color:var(--text-gray); margin-bottom:28px; font-size:0.95rem;">No worries! Enter your email address and we'll send you a reset link.</p>

                <div class="alert error" id="errorMsg">
                    <i data-lucide="alert-circle" size="16"></i>
                    <span id="errorText"></span>
                </div>

                <form id="resetForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrap">
                            <i data-lucide="mail" size="18"></i>
                            <input type="email" id="emailInput" class="form-control" required placeholder="Enter your email address">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span id="btnText">Send Reset Link</span>
                    </button>
                </form>
            </div>

            <!-- Step 2: Success -->
            <div class="step" id="step-success">
                <div class="success-icon"><i data-lucide="mail-check" size="40"></i></div>
                <div class="success-title">Check Your Inbox!</div>
                <p class="success-text">
                    We've sent a password reset link to<br>
                    <span class="success-email" id="sentEmail"></span>
                </p>
                <p class="success-text" style="font-size:0.85rem;">
                    Didn't receive it? Check your spam folder or
                    <a href="#" onclick="resendEmail(event)" style="color:var(--primary); font-weight:600;">resend the email.</a>
                </p>
                <a href="login.html" class="btn-primary" style="display:block; text-align:center; text-decoration:none; margin-top:10px;">Back to Login</a>
            </div>

            <div class="back-link">
                <a href="login.html"><i data-lucide="arrow-left" size="16"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        lucide.createIcons();

        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText   = document.getElementById('btnText');
        const errorMsg  = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();

            errorMsg.classList.remove('show');
            btnText.textContent = 'Sending...';
            submitBtn.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                document.getElementById('sentEmail').textContent = email;
                document.getElementById('step-email').classList.remove('active');
                document.getElementById('step-success').classList.add('active');
            } catch (error) {
                let msg = 'Something went wrong. Please try again.';
                if (error.code === 'auth/user-not-found') msg = 'No account found with this email address.';
                if (error.code === 'auth/invalid-email')  msg = 'Please enter a valid email address.';
                if (error.code === 'auth/too-many-requests') msg = 'Too many attempts. Please try again later.';
                errorText.textContent = msg;
                errorMsg.classList.add('show');
                btnText.textContent = 'Send Reset Link';
                submitBtn.disabled = false;
            }
        });

        window.resendEmail = async function(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            try {
                await sendPasswordResetEmail(auth, email);
                alert('Reset email sent again!');
            } catch (err) {
                alert('Failed to resend. Please wait a moment and try again.');
            }
        };
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
