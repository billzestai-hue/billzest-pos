<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BillZest — Product Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;color:#1a1a1a;}
:root{--p:#4f2d91;--pd:#3b1f6e;--pl:#f0ebff;--org:#f5a623;--grn:#10b981;--red:#ef4444;--bdr:#e0e0e0;}

/* ══ HEADER ══ */
.hdr{background:#fff;border-bottom:1px solid var(--bdr);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-logo{font-size:20px;font-weight:800;color:#1a1a1a;letter-spacing:-0.5px;}
.hdr-logo span{color:var(--org);}
.hdr-tabs{display:flex;gap:4px;}
.ht{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#888;font-family:'Poppins',sans-serif;transition:all .2s;}
.ht.on{background:var(--p);color:#fff;}
.ht:hover:not(.on){background:var(--pl);color:var(--p);}
.hdr-right{display:flex;align-items:center;gap:10px;}
.product-count{background:var(--pl);color:var(--p);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}

/* ══ PAGES ══ */
.pg{display:none;padding:20px;max-width:1200px;margin:0 auto;}
.pg.on{display:block;}

/* ══ ADMIN PAGE ══ */
.admin-layout{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start;}

/* ADD FORM */
.add-form{background:#fff;border-radius:16px;border:1px solid var(--bdr);padding:24px;position:sticky;top:78px;}
.af-title{font-size:17px;font-weight:700;margin-bottom:20px;color:#1a1a1a;display:flex;align-items:center;gap:8px;}

/* PHOTO UPLOAD */
.photo-upload{border:2.5px dashed var(--bdr);border-radius:14px;height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-bottom:16px;position:relative;overflow:hidden;background:#fafafa;}
.photo-upload:hover{border-color:var(--p);background:var(--pl);}
.photo-upload.has-photo{border-style:solid;border-color:var(--p);}
.pu-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none;border-radius:12px;}
.pu-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;border-radius:12px;}
.photo-upload:hover .pu-overlay{display:flex;}
.pu-overlay span{color:#fff;font-size:13px;font-weight:600;}
.pu-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1;}
.pu-icon{font-size:44px;}
.pu-text{font-size:14px;font-weight:600;color:#555;}
.pu-sub{font-size:12px;color:#aaa;}
#photoInput{display:none;}

/* FORM FIELDS */
.ff{margin-bottom:14px;}
.ff label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.ff input,.ff select{width:100%;padding:11px 14px;border:1.5px solid var(--bdr);border-radius:9px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;color:#1a1a1a;transition:border .2s;background:#fff;}
.ff input:focus,.ff select:focus{border-color:var(--p);}
.ffr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-add{width:100%;background:var(--p);color:#fff;border:none;padding:13px;border-radius:9px;font-size:15px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-add:hover{background:var(--pd);transform:translateY(-1px);}
.btn-add:active{transform:translateY(0);}

/* PRODUCTS GRID */
.products-section{background:#fff;border-radius:16px;border:1px solid var(--bdr);padding:20px;}
.ps-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.ps-title{font-size:16px;font-weight:700;}
.search-bar{display:flex;align-items:center;gap:8px;background:#f8f8f8;border:1.5px solid var(--bdr);border-radius:9px;padding:8px 12px;width:220px;}
.search-bar input{border:none;outline:none;font-size:13px;font-family:'Poppins',sans-serif;background:none;color:#1a1a1a;width:100%;}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.cf{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:#fff;color:#888;font-family:'Poppins',sans-serif;transition:all .2s;}
.cf.on{background:var(--p);color:#fff;border-color:var(--p);}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.prod-card{border:1.5px solid var(--bdr);border-radius:12px;overflow:hidden;transition:all .2s;position:relative;background:#fff;}
.prod-card:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,45,145,.12);}
.pc-img{width:100%;height:130px;object-fit:cover;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:48px;}
.pc-img img{width:100%;height:100%;object-fit:cover;}
.pc-body{padding:10px;}
.pc-name{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-cat{font-size:10px;color:#aaa;margin-bottom:4px;}
.pc-price{font-size:14px;font-weight:800;color:var(--p);}
.pc-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s;}
.prod-card:hover .pc-actions{opacity:1;}
.pc-btn{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.pc-edit{background:rgba(255,255,255,.9);}
.pc-del{background:rgba(239,68,68,.9);color:#fff;}
.pc-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:700;color:#fff;}
.badge-new{background:var(--grn);}
.badge-offer{background:var(--org);}
.empty-state{text-align:center;padding:48px;color:#aaa;}
.es-icon{font-size:56px;margin-bottom:12px;}
.es-text{font-size:15px;font-weight:600;}
.es-sub{font-size:13px;margin-top:4px;}

/* ══ MENU PAGE (Customer View) ══ */
.menu-header{background:linear-gradient(135deg,#0d1b4b,#4f2d91);padding:32px 20px;text-align:center;border-radius:16px;margin-bottom:20px;}
.mh-logo{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px;}
.mh-logo span{color:var(--org);}
.mh-sub{font-size:14px;color:rgba(255,255,255,.7);}
.menu-cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.menu-cat{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--bdr);background:#fff;color:#666;font-family:'Poppins',sans-serif;transition:all .2s;}
.menu-cat.on{background:var(--p);color:#fff;border-color:var(--p);}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.menu-card{background:#fff;border:1.5px solid var(--bdr);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--p);}
.mc-img{width:100%;height:160px;object-fit:cover;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:60px;}
.mc-img img{width:100%;height:100%;object-fit:cover;}
.mc-body{padding:14px;}
.mc-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.mc-cat{font-size:11px;color:#aaa;margin-bottom:8px;}
.mc-footer{display:flex;align-items:center;justify-content:space-between;}
.mc-price{font-size:16px;font-weight:800;color:var(--p);}
.mc-add{background:var(--p);color:#fff;border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;font-family:'Poppins',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.mc-add:hover{background:var(--pd);}

/* CART TOAST */
.cart-toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;transform:translateY(80px);transition:transform .3s;display:flex;align-items:center;gap:10px;}
.cart-toast.show{transform:translateY(0);}
.ct-count{background:var(--org);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:18px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:pop .2s ease;}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.mhd{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.mhd h3{font-size:16px;font-weight:700;}
.mcl{background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;}
.mbd{padding:0 20px 20px;}
.mft{padding:12px 20px;border-top:1px solid var(--bdr);display:flex;gap:8px;}
.btn-c{flex:1;background:#f5f5f5;color:#555;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;}
.btn-s{flex:2;background:var(--p);color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:28px;font-size:12px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* RESPONSIVE */
@media(max-width:900px){.admin-layout{grid-template-columns:1fr;}.add-form{position:static;}}
@media(max-width:600px){.pg{padding:12px;}.prod-grid{grid-template-columns:1fr 1fr;}.menu-grid{grid-template-columns:1fr 1fr;}.hdr-tabs{gap:2px;}.ht{padding:6px 10px;font-size:11px;}}
@media(max-width:380px){.prod-grid,.menu-grid{grid-template-columns:1fr 1fr;}.ffr{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">Bill<span>Zest</span></div>
  <div class="hdr-tabs">
    <button class="ht on" onclick="goTab('admin',this)">⚙️ Admin</button>
    <button class="ht" onclick="goTab('menu',this)">🍽️ Menu View</button>
  </div>
  <div class="hdr-right">
    <span class="product-count" id="prodCount">0 Products</span>
  </div>
</div>

<!-- ══ ADMIN PAGE ══ -->
<div class="pg on" id="pg-admin">
  <div class="admin-layout">

    <!-- ADD FORM -->
    <div class="add-form">
      <div class="af-title">➕ Add New Product</div>

      <!-- PHOTO UPLOAD -->
      <div class="photo-upload" id="photoUpload" onclick="document.getElementById('photoInput').click()">
        <img class="pu-img" id="photoPreview" src="" alt="">
        <div class="pu-overlay"><span>📷 Change Photo</span></div>
        <div class="pu-placeholder" id="puPlaceholder">
          <div class="pu-icon">📸</div>
          <div class="pu-text">Tap to add photo</div>
          <div class="pu-sub">Camera or Gallery</div>
        </div>
      </div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">

      <div class="ff">
        <label>Product Name *</label>
        <input type="text" id="prodName" placeholder="e.g. Classic Burger">
      </div>

      <div class="ffr">
        <div class="ff">
          <label>Price (﷼) *</label>
          <input type="number" id="prodPrice" placeholder="0.00" min="0" step="0.5">
        </div>
        <div class="ff">
          <label>Category</label>
          <select id="prodCat">
            <option value="🍔 Burgers">🍔 Burgers</option>
            <option value="🍕 Pizza">🍕 Pizza</option>
            <option value="🍗 Chicken">🍗 Chicken</option>
            <option value="🥩 Grills">🥩 Grills</option>
            <option value="🌮 Wraps">🌮 Wraps</option>
            <option value="🥗 Salads">🥗 Salads</option>
            <option value="🍟 Sides">🍟 Sides</option>
            <option value="🥤 Drinks">🥤 Drinks</option>
            <option value="☕ Hot Drinks">☕ Hot Drinks</option>
            <option value="🍰 Desserts">🍰 Desserts</option>
            <option value="🍽️ Other">🍽️ Other</option>
          </select>
        </div>
      </div>

      <div class="ffr">
        <div class="ff">
          <label>Badge</label>
          <select id="prodBadge">
            <option value="">None</option>
            <option value="new">🟢 New</option>
            <option value="offer">🟠 Offer</option>
          </select>
        </div>
        <div class="ff">
          <label>Status</label>
          <select id="prodStatus">
            <option value="available">✅ Available</option>
            <option value="unavailable">❌ Unavailable</option>
          </select>
        </div>
      </div>

      <button class="btn-add" onclick="addProduct()">
        ➕ Add Product to Menu
      </button>
    </div>

    <!-- PRODUCTS LIST -->
    <div class="products-section">
      <div class="ps-header">
        <div class="ps-title">📦 All Products</div>
        <div class="search-bar">
          <span>🔍</span>
          <input type="text" placeholder="Search..." oninput="filterProds(this.value)">
        </div>
      </div>
      <div class="cat-filter" id="adminCatFilter"></div>
      <div class="prod-grid" id="prodGrid"></div>
    </div>

  </div>
</div>

<!-- ══ MENU PAGE ══ -->
<div class="pg" id="pg-menu">
  <div class="menu-header">
    <div class="mh-logo">Bill<span>Zest</span></div>
    <div class="mh-sub">Our Menu — Fresh & Delicious</div>
  </div>
  <div class="menu-cats" id="menuCats"></div>
  <div class="menu-grid" id="menuGrid"></div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal-box">
    <div class="mhd"><h3>✏️ Edit Product</h3><button class="mcl" onclick="closeModal('editModal')">✕</button></div>
    <div class="mbd">
      <div class="ff"><label>Product Name</label><input type="text" id="editName"></div>
      <div class="ffr">
        <div class="ff"><label>Price (﷼)</label><input type="number" id="editPrice" min="0" step="0.5"></div>
        <div class="ff"><label>Category</label>
          <select id="editCat">
            <option value="🍔 Burgers">🍔 Burgers</option>
            <option value="🍕 Pizza">🍕 Pizza</option>
            <option value="🍗 Chicken">🍗 Chicken</option>
            <option value="🥩 Grills">🥩 Grills</option>
            <option value="🌮 Wraps">🌮 Wraps</option>
            <option value="🥗 Salads">🥗 Salads</option>
            <option value="🍟 Sides">🍟 Sides</option>
            <option value="🥤 Drinks">🥤 Drinks</option>
            <option value="☕ Hot Drinks">☕ Hot Drinks</option>
            <option value="🍰 Desserts">🍰 Desserts</option>
            <option value="🍽️ Other">🍽️ Other</option>
          </select>
        </div>
      </div>
      <div class="ffr">
        <div class="ff"><label>Badge</label>
          <select id="editBadge"><option value="">None</option><option value="new">🟢 New</option><option value="offer">🟠 Offer</option></select>
        </div>
        <div class="ff"><label>Status</label>
          <select id="editStatus"><option value="available">✅ Available</option><option value="unavailable">❌ Unavailable</option></select>
        </div>
      </div>
    </div>
    <div class="mft">
      <button class="btn-c" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn-s" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<!-- CART TOAST -->
<div class="cart-toast" id="cartToast">
  <span>🛒 Added to cart!</span>
  <div class="ct-count" id="cartCount">0</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ DATA ══
var products = [];
var editingId = null;
var activeAdminCat = "All";
var activeMenuCat = "All";
var cartCount = 0;
var searchQuery = "";
var currentPhoto = "";

// Sample products
var sampleProducts = [
  {id:1, name:"Classic Burger", price:32, cat:"🍔 Burgers", badge:"new", status:"available", photo:"", emoji:"🍔"},
  {id:2, name:"Margherita Pizza", price:45, cat:"🍕 Pizza", badge:"", status:"available", photo:"", emoji:"🍕"},
  {id:3, name:"Crispy Chicken", price:28, cat:"🍗 Chicken", badge:"offer", status:"available", photo:"", emoji:"🍗"},
  {id:4, name:"Lemon Mint", price:14, cat:"🥤 Drinks", badge:"", status:"available", photo:"", emoji:"🥤"},
  {id:5, name:"Chocolate Cake", price:25, cat:"🍰 Desserts", badge:"new", status:"available", photo:"", emoji:"🍰"},
  {id:6, name:"Caesar Salad", price:22, cat:"🥗 Salads", badge:"", status:"available", photo:"", emoji:"🥗"},
];
products = sampleProducts.slice();

// ══ TABS ══
function goTab(t, btn){
  document.querySelectorAll(".ht").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on");});
  document.getElementById("pg-"+t).classList.add("on");
  if(t==="menu") renderMenu();
}

// ══ PHOTO UPLOAD ══
function handlePhoto(input){
  var file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){showToast("⚠️ Photo too large! Max 5MB");return;}
  var reader = new FileReader();
  reader.onload = function(e){
    currentPhoto = e.target.result;
    var preview = document.getElementById("photoPreview");
    preview.src = currentPhoto;
    preview.style.display = "block";
    document.getElementById("puPlaceholder").style.display = "none";
    document.getElementById("photoUpload").classList.add("has-photo");
    showToast("✅ Photo uploaded!");
  };
  reader.readAsDataURL(file);
}

// ══ ADD PRODUCT ══
function addProduct(){
  var name = document.getElementById("prodName").value.trim();
  var price = parseFloat(document.getElementById("prodPrice").value);
  var cat = document.getElementById("prodCat").value;
  var badge = document.getElementById("prodBadge").value;
  var status = document.getElementById("prodStatus").value;

  if(!name){showToast("⚠️ Enter product name!");return;}
  if(!price||price<=0){showToast("⚠️ Enter valid price!");return;}

  var catEmojis = {"🍔 Burgers":"🍔","🍕 Pizza":"🍕","🍗 Chicken":"🍗","🥩 Grills":"🥩","🌮 Wraps":"🌮","🥗 Salads":"🥗","🍟 Sides":"🍟","🥤 Drinks":"🥤","☕ Hot Drinks":"☕","🍰 Desserts":"🍰","🍽️ Other":"🍽️"};

  var prod = {
    id: Date.now(),
    name: name,
    price: price,
    cat: cat,
    badge: badge,
    status: status,
    photo: currentPhoto,
    emoji: catEmojis[cat] || "🍽️"
  };

  products.unshift(prod);

  // Reset form
  document.getElementById("prodName").value = "";
  document.getElementById("prodPrice").value = "";
  document.getElementById("prodBadge").value = "";
  document.getElementById("prodStatus").value = "available";
  document.getElementById("photoInput").value = "";
  document.getElementById("photoPreview").src = "";
  document.getElementById("photoPreview").style.display = "none";
  document.getElementById("puPlaceholder").style.display = "flex";
  document.getElementById("photoUpload").classList.remove("has-photo");
  currentPhoto = "";

  renderAdminGrid();
  updateCount();
  showToast("✅ "+name+" added to menu!");
}

// ══ RENDER ADMIN GRID ══
function renderAdminGrid(){
  var cats = ["All"];
  products.forEach(function(p){if(!cats.includes(p.cat))cats.push(p.cat);});

  document.getElementById("adminCatFilter").innerHTML = cats.map(function(c){
    return "<button class='cf"+(c===activeAdminCat?" on":"")+"' onclick='setAdminCat(\""+c.replace(/"/g,"&quot;")+"\")'>"+c+"</button>";
  }).join("");

  var filtered = products.filter(function(p){
    var catOk = activeAdminCat==="All" || p.cat===activeAdminCat;
    var searchOk = !searchQuery || p.name.toLowerCase().includes(searchQuery.toLowerCase());
    return catOk && searchOk;
  });

  if(!filtered.length){
    document.getElementById("prodGrid").innerHTML =
      "<div class='empty-state' style='grid-column:1/-1;'>"+
        "<div class='es-icon'>📦</div>"+
        "<div class='es-text'>No products yet</div>"+
        "<div class='es-sub'>Add your first product using the form!</div>"+
      "</div>";
    return;
  }

  document.getElementById("prodGrid").innerHTML = filtered.map(function(p){
    return "<div class='prod-card'>"+
      "<div class='pc-img'>"+
        (p.photo ? "<img src='"+p.photo+"' alt='"+p.name+"'>" : p.emoji)+
      "</div>"+
      (p.badge ? "<span class='pc-badge badge-"+p.badge+"'>"+(p.badge==="new"?"NEW":"OFFER")+"</span>" : "")+
      "<div class='pc-actions'>"+
        "<button class='pc-btn pc-edit' onclick='openEdit("+p.id+")' title='Edit'>✏️</button>"+
        "<button class='pc-btn pc-del' onclick='deleteProduct("+p.id+")' title='Delete'>🗑️</button>"+
      "</div>"+
      "<div class='pc-body'>"+
        "<div class='pc-name'>"+p.name+"</div>"+
        "<div class='pc-cat'>"+p.cat+"</div>"+
        "<div class='pc-price'>﷼ "+p.price.toFixed(2)+"</div>"+
        (p.status==="unavailable"?"<div style='font-size:10px;color:var(--red);margin-top:2px;'>❌ Unavailable</div>":"")+
      "</div>"+
    "</div>";
  }).join("");
}

function setAdminCat(c){activeAdminCat=c;renderAdminGrid();}
function filterProds(q){searchQuery=q;renderAdminGrid();}

// ══ DELETE ══
function deleteProduct(id){
  if(!confirm("Delete this product?"))return;
  products = products.filter(function(p){return p.id!==id;});
  renderAdminGrid();
  updateCount();
  showToast("🗑️ Product deleted!");
}

// ══ EDIT ══
function openEdit(id){
  editingId = id;
  var p = products.find(function(x){return x.id===id;});
  if(!p)return;
  document.getElementById("editName").value = p.name;
  document.getElementById("editPrice").value = p.price;
  document.getElementById("editCat").value = p.cat;
  document.getElementById("editBadge").value = p.badge;
  document.getElementById("editStatus").value = p.status;
  showModal("editModal");
}
function saveEdit(){
  var p = products.find(function(x){return x.id===editingId;});
  if(!p)return;
  p.name = document.getElementById("editName").value.trim()||p.name;
  p.price = parseFloat(document.getElementById("editPrice").value)||p.price;
  p.cat = document.getElementById("editCat").value;
  p.badge = document.getElementById("editBadge").value;
  p.status = document.getElementById("editStatus").value;
  closeModal("editModal");
  renderAdminGrid();
  showToast("✅ "+p.name+" updated!");
}

// ══ MENU VIEW ══
function renderMenu(){
  var availableProds = products.filter(function(p){return p.status==="available";});
  var cats = ["All"];
  availableProds.forEach(function(p){if(!cats.includes(p.cat))cats.push(p.cat);});

  document.getElementById("menuCats").innerHTML = cats.map(function(c){
    return "<button class='menu-cat"+(c===activeMenuCat?" on":"")+"' onclick='setMenuCat(\""+c.replace(/"/g,"&quot;")+"\")'>"+c+"</button>";
  }).join("");

  var filtered = activeMenuCat==="All" ? availableProds : availableProds.filter(function(p){return p.cat===activeMenuCat;});

  if(!filtered.length){
    document.getElementById("menuGrid").innerHTML =
      "<div class='empty-state' style='grid-column:1/-1;'>"+
        "<div class='es-icon'>🍽️</div>"+
        "<div class='es-text'>No items in this category</div>"+
        "<div class='es-sub'>Add products from Admin panel</div>"+
      "</div>";
    return;
  }

  document.getElementById("menuGrid").innerHTML = filtered.map(function(p){
    return "<div class='menu-card' onclick='addToCart(\""+p.name+"\")'>"+
      "<div class='mc-img'>"+
        (p.photo ? "<img src='"+p.photo+"' alt='"+p.name+"'>" : p.emoji)+
      "</div>"+
      "<div class='mc-body'>"+
        "<div class='mc-name'>"+p.name+"</div>"+
        "<div class='mc-cat'>"+p.cat+"</div>"+
        "<div class='mc-footer'>"+
          "<div class='mc-price'>﷼ "+p.price.toFixed(2)+"</div>"+
          "<button class='mc-add' onclick='event.stopPropagation();addToCart(\""+p.name+"\")'>+</button>"+
        "</div>"+
      "</div>"+
    "</div>";
  }).join("");
}

function setMenuCat(c){activeMenuCat=c;renderMenu();}

function addToCart(name){
  cartCount++;
  document.getElementById("cartCount").textContent = cartCount;
  var ct = document.getElementById("cartToast");
  ct.querySelector("span").textContent = "🛒 "+name+" added!";
  ct.classList.add("show");
  setTimeout(function(){ct.classList.remove("show");},2000);
}

// ══ HELPERS ══
function updateCount(){
  document.getElementById("prodCount").textContent = products.length+" Products";
}
function showModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
document.addEventListener("click",function(e){
  document.querySelectorAll(".modal-bg.open").forEach(function(m){
    if(e.target===m)m.classList.remove("open");
  });
});
function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

// ══ INIT ══
renderAdminGrid();
updateCount();
</script>
</body>
</html>
