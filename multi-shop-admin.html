<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>BillZest Multi-Shop Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#1e293b;}
:root{--p:#7c3aed;--pd:#5b21b6;--pl:#ede9fe;--org:#f59e0b;--grn:#10b981;--red:#ef4444;--teal:#14b8a6;--bdr:#e2e8f0;}
.loading{position:fixed;inset:0;background:white;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px;}
.loading-spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.app{display:none;}
.app-header{background:white;border-bottom:1px solid var(--bdr);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent;}
.shop-selector{background:#f8fafc;border:1px solid var(--bdr);border-radius:40px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;}
.user-area{display:flex;align-items:center;gap:12px;}
.btn-logout{background:transparent;border:1px solid var(--bdr);padding:6px 12px;border-radius:30px;cursor:pointer;}
.content{padding:24px;max-width:1200px;margin:0 auto;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px;}
.shop-card{background:white;border-radius:20px;border:1px solid var(--bdr);padding:20px;transition:0.2s;cursor:pointer;}
.shop-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.08);}
.shop-name{font-size:18px;font-weight:700;margin-bottom:4px;}
.shop-type{font-size:13px;color:#64748b;margin-bottom:12px;}
.shop-actions{display:flex;gap:8px;margin-top:12px;}
.btn-icon{background:transparent;border:none;cursor:pointer;font-size:16px;padding:4px;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;}
.modal-content{background:white;border-radius:24px;padding:24px;width:90%;max-width:500px;}
.modal input,.modal select{width:100%;padding:12px;border:1px solid var(--bdr);border-radius:12px;margin-bottom:16px;}
.modal-buttons{display:flex;gap:12px;justify-content:flex-end;}
.btn-primary{background:var(--p);color:white;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;}
.btn-secondary{background:#f1f5f9;border:none;padding:10px 20px;border-radius:40px;cursor:pointer;}
.dashboard{display:none;}
.shop-dashboard-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.back-btn{background:transparent;border:none;color:var(--p);cursor:pointer;font-weight:600;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:white;padding:10px 20px;border-radius:40px;font-size:13px;z-index:9999;transition:0.3s;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div>BillZest Multi-Shop</div>
</div>

<!-- Main App -->
<div class="app" id="mainApp">
  <div class="app-header">
    <div class="logo">BillZest POS</div>
    <div>
      <select id="shopSelector" class="shop-selector" onchange="switchShop()">
        <option value="">-- Select Shop --</option>
      </select>
    </div>
    <div class="user-area">
      <span id="userEmail"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>
  <div class="content">
    <!-- Shop List View -->
    <div id="shopListView">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2>My Shops</h2>
        <button class="btn-primary" onclick="openShopModal()">+ Add New Shop</button>
      </div>
      <div id="shopList" class="shop-grid">Loading shops...</div>
    </div>

    <!-- Shop Dashboard View (will be loaded dynamically) -->
    <div id="dashboardView" class="dashboard">
      <div class="shop-dashboard-header">
        <button class="back-btn" onclick="backToShopList()">← Back to Shops</button>
        <h2 id="dashboardShopName"></h2>
      </div>
      <div id="dashboardContent">Loading dashboard...</div>
    </div>
  </div>
</div>

<!-- Modal for Add/Edit Shop -->
<div id="shopModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add New Shop</h3>
    <input type="text" id="shopName" placeholder="Shop Name (e.g., Arabian Coffee)" autocomplete="off">
    <select id="shopType">
      <option value="coffee">☕ Coffee Shop</option>
      <option value="restaurant">🍽️ Restaurant</option>
      <option value="grocery">🛒 Grocery Store</option>
      <option value="electronics">📱 Electronics</option>
      <option value="hotel">🏨 Hotel</option>
      <option value="retail">🛍️ Retail</option>
    </select>
    <input type="text" id="shopPhone" placeholder="Phone Number">
    <input type="text" id="shopAddress" placeholder="Address">
    <input type="hidden" id="shopId">
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeShopModal()">Cancel</button>
      <button class="btn-primary" onclick="saveShop()">Save</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, addDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCN0akvFXOHM6WPHv9ve9noqqmauO3TJRY",
  authDomain: "billzest-pos.firebaseapp.com",
  projectId: "billzest-pos",
  storageBucket: "billzest-pos.firebasestorage.app",
  messagingSenderId: "946546876429",
  appId: "1:946546876429:web:9b4a7aa3cecbf3aea83544"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let shops = [];
let currentShopId = null;
let currentDashboard = null; // store dashboard instance if needed

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

// Load shops for current user
async function loadShops() {
  if (!currentUser) return;
  const q = query(collection(db, "shops"), where("ownerId", "==", currentUser.uid));
  const snap = await getDocs(q);
  shops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderShopList();
  renderShopSelector();
}
function renderShopList() {
  const container = document.getElementById('shopList');
  if (!container) return;
  if (shops.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;">No shops yet. Click "Add New Shop" to create.</div>'; return; }
  container.innerHTML = shops.map(shop => `
    <div class="shop-card" onclick="openShopDashboard('${shop.id}')">
      <div class="shop-name">${shop.name}</div>
      <div class="shop-type">${shop.type || 'General'}</div>
      <div class="shop-address">${shop.address || ''}</div>
      <div class="shop-actions">
        <button class="btn-icon" onclick="event.stopPropagation(); editShop('${shop.id}','${shop.name}','${shop.type}','${shop.phone||''}','${shop.address||''}')">✏️</button>
        <button class="btn-icon" onclick="event.stopPropagation(); deleteShop('${shop.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}
function renderShopSelector() {
  const sel = document.getElementById('shopSelector');
  sel.innerHTML = '<option value="">-- Select Shop --</option>' + shops.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}

// Shop CRUD
window.openShopModal = (editMode = false) => {
  document.getElementById('modalTitle').innerText = editMode ? 'Edit Shop' : 'Add New Shop';
  document.getElementById('shopModal').style.display = 'flex';
};
window.closeShopModal = () => {
  document.getElementById('shopModal').style.display = 'none';
  document.getElementById('shopId').value = '';
  document.getElementById('shopName').value = '';
  document.getElementById('shopType').value = 'coffee';
  document.getElementById('shopPhone').value = '';
  document.getElementById('shopAddress').value = '';
};
window.saveShop = async () => {
  const id = document.getElementById('shopId').value;
  const name = document.getElementById('shopName').value.trim();
  const type = document.getElementById('shopType').value;
  const phone = document.getElementById('shopPhone').value.trim();
  const address = document.getElementById('shopAddress').value.trim();
  if (!name) { showToast('Enter shop name'); return; }
  const data = { name, type, phone, address, ownerId: currentUser.uid, updatedAt: new Date().toISOString() };
  if (id) {
    await updateDoc(doc(db, "shops", id), data);
    showToast('Shop updated');
  } else {
    await addDoc(collection(db, "shops"), { ...data, createdAt: new Date().toISOString() });
    showToast('Shop added');
  }
  closeShopModal();
  await loadShops();
};
window.editShop = (id, name, type, phone, address) => {
  document.getElementById('shopId').value = id;
  document.getElementById('shopName').value = name;
  document.getElementById('shopType').value = type;
  document.getElementById('shopPhone').value = phone || '';
  document.getElementById('shopAddress').value = address || '';
  openShopModal(true);
};
window.deleteShop = async (id) => {
  if (confirm('Delete this shop? All its data will be lost.')) {
    await deleteDoc(doc(db, "shops", id));
    // Also delete shop-specific subcollections? Optional.
    showToast('Shop deleted');
    await loadShops();
    if (currentShopId === id) backToShopList();
  }
};

// Dashboard for selected shop
window.openShopDashboard = async (shopId) => {
  currentShopId = shopId;
  document.getElementById('shopListView').style.display = 'none';
  document.getElementById('dashboardView').style.display = 'block';
  document.getElementById('dashboardShopName').innerText = shops.find(s => s.id === shopId)?.name || 'Shop Dashboard';
  await loadShopDashboard(shopId);
};
window.backToShopList = () => {
  currentShopId = null;
  document.getElementById('shopListView').style.display = 'block';
  document.getElementById('dashboardView').style.display = 'none';
};
window.switchShop = () => {
  const sel = document.getElementById('shopSelector');
  const shopId = sel.value;
  if (shopId) openShopDashboard(shopId);
  else backToShopList();
};

// Shop-specific dashboard (simplified but functional)
async function loadShopDashboard(shopId) {
  const container = document.getElementById('dashboardContent');
  container.innerHTML = '<div class="loading-spinner" style="margin:auto;"></div><div>Loading shop data...</div>';
  
  // Fetch shop-specific data
  const productsRef = collection(db, "shops", shopId, "products");
  const ordersRef = collection(db, "shops", shopId, "orders");
  const brandRef = doc(db, "shops", shopId, "brand");
  
  const [productsSnap, ordersSnap, brandSnap] = await Promise.all([
    getDocs(productsRef),
    getDocs(ordersRef),
    getDoc(brandRef)
  ]);
  
  const products = productsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const orders = ordersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const brand = brandSnap.exists() ? brandSnap.data() : { companyName: shops.find(s=>s.id===shopId)?.name || 'My Shop', logoBase64: '', bizType: 'coffee shop' };
  
  // Generate sample products if empty
  if (products.length === 0) {
    // Add sample products based on shop type
    const shopType = shops.find(s=>s.id===shopId)?.type || 'coffee';
    const samples = getSampleProducts(shopType);
    for (let p of samples) {
      await addDoc(collection(db, "shops", shopId, "products"), p);
    }
    // reload
    return loadShopDashboard(shopId);
  }
  
  // Calculate today's sales
  const today = new Date().toISOString().split('T')[0];
  let todaySales = 0;
  orders.forEach(o => { if (o.date.split('T')[0] === today) todaySales += o.total || 0; });
  
  // Low stock
  const lowStock = products.filter(p => (p.stock||0) < 10);
  
  // Top selling
  const productSales = {};
  orders.forEach(o => { o.items?.forEach(i => { productSales[i.name] = (productSales[i.name]||0) + i.qty; }); });
  const top = Object.entries(productSales).sort((a,b)=>b[1]-a[1]).slice(0,5);
  
  // Recent orders (last 5)
  const recent = [...orders].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  
  // Sales chart (last 7 days)
  const daily = {};
  for (let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); daily[d.toISOString().split('T')[0]] = 0; }
  orders.forEach(o => { const date = o.date.split('T')[0]; if (daily[date]!==undefined) daily[date] += o.total||0; });
  const labels = Object.keys(daily).map(d => new Date(d).toLocaleDateString(undefined, {month:'short',day:'numeric'}));
  const data = Object.values(daily);
  
  // Render HTML
  container.innerHTML = `
    <div class="stats-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;">
      <div class="stat-card" style="background:white;border-radius:20px;padding:16px;"><div class="stat-icon">💰</div><div class="stat-val">﷼${todaySales}</div><div class="stat-lbl">Today's Sales</div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-val">${products.length}</div><div class="stat-lbl">Products</div></div>
      <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-val">${lowStock.length}</div><div class="stat-lbl">Low Stock</div></div>
      <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-val">4.9</div><div class="stat-lbl">Rating</div></div>
    </div>
    <div class="section" style="background:white;border-radius:20px;border:1px solid var(--bdr);margin-bottom:20px;">
      <div class="section-hdr" style="padding:16px;"><div class="section-title">🕒 Recent Orders</div></div>
      <div class="section-body" style="padding:16px;">
        ${recent.length ? `<table class="orders-table" style="width:100%;"><thead><tr><th>Order ID</th><th>Amount</th><th>Date</th></tr></thead><tbody>${recent.map(o => `<tr><td>#${o.id.slice(-6)}</td><td>﷼${o.total}</td><td>${new Date(o.date).toLocaleDateString()}</td></tr>`).join('')}</tbody></table>` : '<div>No orders yet</div>'}
      </div>
    </div>
    <div class="stats-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      <div class="section"><div class="section-hdr"><div class="section-title">⚠️ Low Stock</div></div><div class="section-body">${lowStock.length ? lowStock.map(p => `<div class="product-item" style="display:flex;justify-content:space-between;"><span>${p.name}</span><span>Stock: ${p.stock}</span></div>`).join('') : 'All good'}</div></div>
      <div class="section"><div class="section-hdr"><div class="section-title">🏆 Top Selling</div></div><div class="section-body">${top.length ? top.map(([name,qty]) => `<div style="display:flex;justify-content:space-between;"><span>${name}</span><span>${qty} sold</span></div>`).join('') : 'No sales yet'}</div></div>
    </div>
    <div class="section"><div class="section-hdr"><div class="section-title">📈 Sales Trend (7 days)</div></div><div class="section-body"><canvas id="shopSalesChart"></canvas></div></div>
  `;
  // Draw chart
  const ctx = document.getElementById('shopSalesChart')?.getContext('2d');
  if (ctx) {
    if (window.shopChart) window.shopChart.destroy();
    window.shopChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Sales (SAR)', data, borderColor: '#7c3aed', tension: 0.3, fill: true }] } });
  }
}

// Sample products by shop type
function getSampleProducts(shopType) {
  if (shopType === 'coffee') {
    return [
      { name: "Arabic Coffee", price: 12, category: "Coffee", stock: 50 },
      { name: "Latte", price: 14, category: "Coffee", stock: 30 },
      { name: "Cappuccino", price: 14, category: "Coffee", stock: 25 },
      { name: "Iced Caramel Macchiato", price: 16, category: "Cold Drinks", stock: 20 },
      { name: "Chicken Sandwich", price: 18, category: "Food", stock: 15 },
      { name: "Croissant", price: 8, category: "Pastry", stock: 40 }
    ];
  } else if (shopType === 'grocery') {
    return [
      { name: "Rice (5kg)", price: 35, category: "Staples", stock: 100 },
      { name: "Cooking Oil (1L)", price: 18, category: "Oil", stock: 80 },
      { name: "Milk (1L)", price: 7, category: "Dairy", stock: 50 },
      { name: "Eggs (12pcs)", price: 12, category: "Dairy", stock: 60 },
      { name: "Bread", price: 4, category: "Bakery", stock: 30 }
    ];
  } else if (shopType === 'electronics') {
    return [
      { name: "USB Cable", price: 15, category: "Accessories", stock: 100 },
      { name: "Phone Charger", price: 45, category: "Chargers", stock: 50 },
      { name: "Headphones", price: 89, category: "Audio", stock: 30 },
      { name: "Power Bank", price: 79, category: "Battery", stock: 25 }
    ];
  } else {
    return [
      { name: "Sample Product 1", price: 10, category: "General", stock: 100 },
      { name: "Sample Product 2", price: 20, category: "General", stock: 100 }
    ];
  }
}

// Auth state
let authTimeout = setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; alert('Loading timeout. Please login.'); window.location.href = 'index.html'; }, 8000);
onAuthStateChanged(auth, async (user) => {
  clearTimeout(authTimeout);
  document.getElementById('loadingScreen').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('userEmail').innerText = user.email;
    document.getElementById('mainApp').style.display = 'block';
    await loadShops();
    // Check if shop selector has value from previous session?
  } else {
    // Redirect to login page (or show simple login)
    window.location.href = 'index.html';
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
</script>
</body>
</html>
