<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - Billzestpos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .cancel-container {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .cancel-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }
        .cancel-icon i { color: white; width: 48px; height: 48px; }
        h1 { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 20px; line-height: 1.6; }
        .btn-retry {
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .btn-home {
            background: #e2e8f0;
            color: #334155;
            padding: 14px 28px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .whatsapp-link {
            display: inline-block;
            margin-top: 20px;
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="cancel-container">
        <div class="cancel-icon"><i data-lucide="x-circle"></i></div>
        
        <h1>Payment Cancelled ❌</h1>
        <p>Your payment was cancelled or did not complete successfully.</p>
        
        <a href="payment.html" class="btn-retry">Try Again</a>
        <a href="dashboard.html" class="btn-home">Back to Home</a>
        
        <div>
            <a href="https://wa.me/966550898978" class="whatsapp-link" target="_blank">
                📱 Need Help? Contact Support
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
