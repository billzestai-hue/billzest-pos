<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory & Product Management | BillZest POS</title>
    <meta name="description" content="Manage your products, stock levels, and categories easily with BillZest POS cloud-based inventory system.">
    <link rel="canonical" href="https://www.billzestpos.com/billzest-products.html" />
</head>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#4f2d91;--purple-dark:#3b1f6e;--purple-light:#f0ebff;
  --teal:#00b5a3;--orange:#f5a623;--red:#ef4444;--green:#10b981;
  --gray:#f5f5f5;--bdr:#e0e0e0;--dark:#1a1a1a;--muted:#888;
}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;color:var(--dark);}

/* ══ HEADER ══ */
.header{background:#fff;border-bottom:1px solid var(--bdr);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;}
.h-logo{font-size:22px;font-weight:800;color:#1a1a1a;letter-spacing:-0.5px;}
.h-logo span{color:var(--orange);}
.h-tabs{display:flex;gap:4px;}
.h-tab{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:all 0.2s;font-family:'Poppins',sans-serif;}
.h-tab.active{background:var(--purple);color:#fff;}
.h-tab:hover:not(.active){background:var(--purple-light);color:var(--purple);}
.h-right{display:flex;align-items:center;gap:10px;}
.btn-add-main{background:var(--purple);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
.btn-add-main:hover{background:var(--purple-dark);}

/* ══ PAGE VIEWS ══ */
.page{display:none;}
.page.active{display:block;}

/* ══ ADMIN PAGE ══ */
.admin-wrap{max-width:1200px;margin:0 auto;padding:28px 20px;}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:14px;}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.stat-val{font-size:24px;font-weight:800;color:var(--dark);}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:1px;}

/* Category filter */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:9px 14px;flex:1;min-width:200px;}
.search-box input{border:none;outline:none;font-family:'Poppins',sans-serif;font-size:13px;color:var(--dark);width:100%;background:none;}
.search-box input::placeholder{color:var(--muted);}
.cat-filters{display:flex;gap:8px;flex-wrap:wrap;}
.cat-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--bdr);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#555;font-family:'Poppins',sans-serif;transition:all 0.2s;white-space:nowrap;}
.cat-btn.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.cat-btn:hover:not(.active){border-color:var(--purple);color:var(--purple);}
.sort-sel{padding:9px 13px;border:1px solid var(--bdr);border-radius:8px;font-size:12px;font-family:'Poppins',sans-serif;background:#fff;color:#555;outline:none;cursor:pointer;}

/* Product grid */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
.prod-card{background:#fff;border:1px solid var(--bdr);border-radius:14px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;position:relative;}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.1);}
.prod-img{width:100%;height:160px;object-fit:cover;background:var(--gray);display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;}
.prod-badge{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.prod-badge.offer{background:var(--orange);}
.prod-stock-off{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;}
.prod-body{padding:14px 16px;}
.prod-cat-tag{font-size:10px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
.prod-name{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:4px;}
.prod-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.prod-price-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.prod-price{font-size:18px;font-weight:800;color:var(--purple);}
.prod-old-price{font-size:12px;color:var(--muted);text-decoration:line-through;margin-left:6px;}
.prod-discount{font-size:11px;font-weight:700;color:var(--orange);background:rgba(245,166,35,0.12);padding:2px 7px;border-radius:10px;}
.prod-actions{display:flex;gap:8px;align-items:center;}
.toggle-wrap{display:flex;align-items:center;gap:6px;margin-right:auto;}
.toggle-lbl{font-size:11px;color:var(--muted);}
.tog{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;border:none;transition:background 0.2s;flex-shrink:0;}
.tog.on{background:var(--green);}
.tog.off{background:#ccc;}
.tog::after{content:'';position:absolute;top:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left 0.2s;}
.tog.on::after{left:18px;}
.tog.off::after{left:2px;}
.btn-edit{background:var(--purple-light);color:var(--purple);border:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:all 0.2s;}
.btn-edit:hover{background:var(--purple);color:#fff;}
.btn-del{background:#fff0f0;color:var(--red);border:none;padding:7px 10px;border-radius:7px;font-size:14px;cursor:pointer;transition:all 0.2s;}
.btn-del:hover{background:var(--red);color:#fff;}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .ei{font-size:56px;margin-bottom:14px;}
.empty-state p{font-size:15px;}

/* ══ MODAL ══ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);animation:pop .22s ease;}
@keyframes pop{from{opacity:0;transform:scale(0.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-head{padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-head h3{font-size:18px;font-weight:700;color:var(--dark);}
.modal-cls{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px;}
.modal-body{padding:0 24px 24px;}
.mf{margin-bottom:16px;}
.mf label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.mf input,.mf select,.mf textarea{width:100%;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;font-family:'Poppins',sans-serif;color:var(--dark);outline:none;transition:border 0.2s;background:#fff;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--purple);}
.mf textarea{resize:vertical;min-height:80px;}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:8px;}
.emoji-opt{width:36px;height:36px;border:1.5px solid var(--bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all 0.2s;}
.emoji-opt:hover,.emoji-opt.selected{border-color:var(--purple);background:var(--purple-light);}
.modal-foot{display:flex;gap:10px;padding:16px 24px;border-top:1px solid var(--bdr);}
.btn-cancel-m{flex:1;background:#f5f5f5;color:#555;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;}
.btn-save-m{flex:2;background:var(--purple);color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;transition:background 0.2s;}
.btn-save-m:hover{background:var(--purple-dark);}

/* ══ LANDING PAGE ══ */
.landing-wrap{max-width:1100px;margin:0 auto;padding:32px 20px;}
.landing-hero{background:linear-gradient(135deg,#0d1b4b 0%,#1a0845 100%);border-radius:20px;padding:48px 40px;margin-bottom:36px;position:relative;overflow:hidden;}
.landing-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.6) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;opacity:0.4;}
.landing-hero h1{font-size:32px;font-weight:800;color:#fff;margin-bottom:8px;position:relative;z-index:1;}
.landing-hero h1 span{color:var(--orange);}
.landing-hero p{font-size:15px;color:rgba(255,255,255,0.75);position:relative;z-index:1;}
.landing-search{display:flex;align-items:center;gap:12px;margin-top:20px;position:relative;z-index:1;}
.ls-input{flex:1;padding:12px 18px;border-radius:10px;border:none;font-size:14px;font-family:'Poppins',sans-serif;outline:none;}
.ls-btn{background:var(--orange);color:#fff;border:none;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;white-space:nowrap;}

.landing-cats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.lcat{padding:9px 20px;border-radius:25px;border:2px solid var(--bdr);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#555;font-family:'Poppins',sans-serif;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.lcat.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.lcat:hover:not(.active){border-color:var(--purple);color:var(--purple);}

.menu-section-title{font-size:20px;font-weight:700;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:32px;}
.menu-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);transition:transform 0.2s,box-shadow 0.2s;position:relative;}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.12);}
.menu-card.out-of-stock{opacity:0.6;}
.mc-img{height:150px;display:flex;align-items:center;justify-content:center;font-size:60px;background:var(--gray);position:relative;}
.mc-badge{position:absolute;top:10px;left:10px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.mc-out-badge{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}
.mc-body{padding:14px 16px;}
.mc-cat{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.mc-name{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:4px;}
.mc-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.mc-footer{display:flex;align-items:center;justify-content:space-between;}
.mc-price{font-size:17px;font-weight:800;color:var(--purple);}
.mc-old{font-size:12px;color:var(--muted);text-decoration:line-through;margin-left:4px;}
.btn-order{background:var(--purple);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;transition:background 0.2s;}
.btn-order:hover{background:var(--purple-dark);}
.btn-order:disabled{background:#ccc;cursor:not-allowed;}

/* Cart toast */
.cart-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.3s;white-space:nowrap;}
.cart-toast.show{transform:translateX(-50%) translateY(0);}

/* Responsive */
@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .prod-grid{grid-template-columns:1fr 1fr;}
  .menu-grid{grid-template-columns:1fr 1fr;}
  .mf-row{grid-template-columns:1fr;}
  .landing-hero{padding:28px 20px;}
  .landing-hero h1{font-size:22px;}
}
@media(max-width:480px){
  .prod-grid{grid-template-columns:1fr;}
  .menu-grid{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .h-tabs{gap:2px;}
  .h-tab{padding:6px 12px;font-size:11px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="h-logo">Bill<span>Zest</span> <span style="font-size:13px;color:var(--muted);font-weight:500;">| Menu Manager</span></div>
  <div class="h-tabs">
    <button class="h-tab active" onclick="showPage('admin')">⚙️ Admin</button>
    <button class="h-tab" onclick="showPage('landing')">🌐 Customer View</button>
  </div>
  <div class="h-right">
    <button class="btn-add-main" onclick="openModal()">＋ Add Product</button>
  </div>
</div>

<!-- ══ ADMIN PAGE ══ -->
<div class="page active" id="page-admin">
  <div class="admin-wrap">
    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        🔍 <input type="text" id="searchInput" placeholder="Search products..." oninput="renderAdmin()">
      </div>
      <div class="cat-filters" id="catFilters"></div>
      <select class="sort-sel" id="sortSel" onchange="renderAdmin()">
        <option value="name">Sort: Name</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="stock">In Stock First</option>
      </select>
      <button class="btn-add-main" onclick="openModal()" style="border-radius:8px;">＋ Add Product</button>
    </div>

    <!-- Grid -->
    <div class="prod-grid" id="prodGrid"></div>
  </div>
</div>

<!-- ══ LANDING PAGE ══ -->
<div class="page" id="page-landing">
  <div class="landing-wrap">
    <div class="landing-hero">
      <h1>🍽️ Our <span>Menu</span></h1>
      <p>Fresh ingredients, authentic flavors — order your favorites today!</p>
      <div class="landing-search">
        <input class="ls-input" type="text" id="lsInput" placeholder="Search menu items..." oninput="renderLanding()">
        <button class="ls-btn">🔍 Search</button>
      </div>
    </div>
    <div class="landing-cats" id="landingCats"></div>
    <div id="landingGrid"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">➕ Add New Product</h3>
      <button class="modal-cls" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mf">
        <label>Choose Icon / Image</label>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <div class="mf-row">
        <div class="mf">
          <label>Product Name *</label>
          <input type="text" id="mName" placeholder="e.g. Chicken Burger">
        </div>
        <div class="mf">
          <label>Category *</label>
          <select id="mCat">
            <option value="">Select category</option>
            <option>🍔 Burgers</option>
            <option>🍕 Pizza</option>
            <option>🍗 Chicken</option>
            <option>🥗 Salads</option>
            <option>🍟 Sides</option>
            <option>🥤 Drinks</option>
            <option>🍰 Desserts</option>
            <option>🌮 Wraps</option>
            <option>🍜 Pasta</option>
            <option>🥩 Grills</option>
          </select>
        </div>
      </div>
      <div class="mf">
        <label>Description</label>
        <textarea id="mDesc" placeholder="Describe this item..."></textarea>
      </div>
      <div class="mf-row">
        <div class="mf">
          <label>Price (SAR) *</label>
          <input type="number" id="mPrice" placeholder="e.g. 29.99" min="0" step="0.01">
        </div>
        <div class="mf">
          <label>Original Price (optional)</label>
          <input type="number" id="mOldPrice" placeholder="e.g. 39.99" min="0" step="0.01">
        </div>
      </div>
      <div class="mf-row">
        <div class="mf">
          <label>Special Offer Tag</label>
          <input type="text" id="mOffer" placeholder="e.g. 20% OFF, NEW, HOT">
        </div>
        <div class="mf">
          <label>Stock Status</label>
          <select id="mStock">
            <option value="1">✅ In Stock</option>
            <option value="0">❌ Out of Stock</option>
          </select>
        </div>
      </div>
      <div id="modalErr" style="color:var(--red);font-size:12px;margin-top:8px;display:none;"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-save-m" onclick="saveProduct()">💾 Save Product</button>
    </div>
  </div>
</div>

<!-- Cart Toast -->
<div class="cart-toast" id="cartToast">🛒 Added to cart!</div>

<script>
// ══ DATA ══
var EMOJIS = ['🍔','🍕','🍗','🥗','🍟','🥤','🍰','🌮','🍜','🥩','🍣','🥙','🧆','🫔','🍱','🥐','☕','🧃','🍦','🥘'];
var selectedEmoji = '🍔';
var editingId = null;

var products = [
  {id:1,name:'Classic Burger',cat:'🍔 Burgers',desc:'Juicy beef patty with fresh lettuce, tomatoes and our special sauce',price:32,oldPrice:42,offer:'BESTSELLER',stock:true,emoji:'🍔'},
  {id:2,name:'Crispy Fried Chicken',cat:'🍗 Chicken',desc:'Golden crispy chicken with secret blend of spices',price:28,oldPrice:0,offer:'NEW',stock:true,emoji:'🍗'},
  {id:3,name:'Margherita Pizza',cat:'🍕 Pizza',desc:'Classic pizza with fresh mozzarella and basil',price:45,oldPrice:55,offer:'20% OFF',stock:true,emoji:'🍕'},
  {id:4,name:'Caesar Salad',cat:'🥗 Salads',desc:'Crispy romaine lettuce with parmesan and croutons',price:22,oldPrice:0,offer:'',stock:true,emoji:'🥗'},
  {id:5,name:'Loaded Fries',cat:'🍟 Sides',desc:'Crispy fries loaded with cheese sauce and jalapeños',price:18,oldPrice:0,offer:'HOT 🌶️',stock:true,emoji:'🍟'},
  {id:6,name:'Mango Smoothie',cat:'🥤 Drinks',desc:'Fresh mango blended with yogurt and honey',price:15,oldPrice:0,offer:'',stock:false,emoji:'🥤'},
  {id:7,name:'Chocolate Cake',cat:'🍰 Desserts',desc:'Rich dark chocolate cake with ganache frosting',price:25,oldPrice:30,offer:'',stock:true,emoji:'🍰'},
  {id:8,name:'Chicken Wrap',cat:'🌮 Wraps',desc:'Grilled chicken with vegetables in a soft tortilla',price:26,oldPrice:0,offer:'',stock:true,emoji:'🌮'},
  {id:9,name:'Pepperoni Pizza',cat:'🍕 Pizza',desc:'Classic pepperoni with extra cheese',price:50,oldPrice:60,offer:'10% OFF',stock:true,emoji:'🍕'},
  {id:10,name:'Grilled Steak',cat:'🥩 Grills',desc:'Prime cut steak grilled to perfection',price:85,oldPrice:0,offer:'PREMIUM',stock:true,emoji:'🥩'},
  {id:11,name:'Cheese Burger',cat:'🍔 Burgers',desc:'Double cheese with caramelized onions',price:38,oldPrice:45,offer:'',stock:true,emoji:'🍔'},
  {id:12,name:'Cola',cat:'🥤 Drinks',desc:'Ice cold Coca-Cola',price:8,oldPrice:0,offer:'',stock:true,emoji:'🥤'},
];

var activeCat = 'All';
var activePageCat = 'All';

// ══ PAGE SWITCH ══
function showPage(p){
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.h-tab').forEach(function(x){x.classList.remove('active');});
  document.getElementById('page-'+p).classList.add('active');
  event.target.classList.add('active');
  if(p==='landing')renderLanding();
  else renderAdmin();
}

// ══ CATEGORIES ══
function getCategories(){
  var cats=['All'];
  products.forEach(function(p){if(!cats.includes(p.cat))cats.push(p.cat);});
  return cats;
}

// ══ RENDER ADMIN ══
function renderAdmin(){
  // Stats
  var total=products.length;
  var inStock=products.filter(function(p){return p.stock;}).length;
  var offers=products.filter(function(p){return p.offer;}).length;
  var cats=getCategories().length-1;
  document.getElementById('statsRow').innerHTML=
    statCard('📦','bg:#eef2ff','Total Items',total)+
    statCard('✅','bg:#ecfdf5','In Stock',inStock)+
    statCard('🏷️','bg:#fff7ed','With Offers',offers)+
    statCard('🗂️','bg:#faf5ff','Categories',cats);

  // Cat filters
  var catsHtml=getCategories().map(function(c){
    return '<button class="cat-btn'+(activeCat===c?' active':'')+'" onclick="setCat(\''+c+'\')" >'+c+'</button>';
  }).join('');
  document.getElementById('catFilters').innerHTML=catsHtml;

  // Filter & sort
  var search=document.getElementById('searchInput').value.toLowerCase();
  var sort=document.getElementById('sortSel').value;
  var filtered=products.filter(function(p){
    var matchCat=activeCat==='All'||p.cat===activeCat;
    var matchSearch=p.name.toLowerCase().includes(search)||p.cat.toLowerCase().includes(search);
    return matchCat&&matchSearch;
  });
  if(sort==='price-asc')filtered.sort(function(a,b){return a.price-b.price;});
  else if(sort==='price-desc')filtered.sort(function(a,b){return b.price-a.price;});
  else if(sort==='stock')filtered.sort(function(a,b){return b.stock-a.stock;});
  else filtered.sort(function(a,b){return a.name.localeCompare(b.name);});

  if(!filtered.length){
    document.getElementById('prodGrid').innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="ei">🔍</div><p>No products found. Try a different search or category.</p></div>';
    return;
  }

  document.getElementById('prodGrid').innerHTML=filtered.map(function(p){
    var disc=p.oldPrice?(Math.round((1-p.price/p.oldPrice)*100))+'% OFF':'';
    return '<div class="prod-card">'+
      '<div class="prod-img" style="font-size:64px;background:'+catBg(p.cat)+'">'+p.emoji+
      (p.offer?'<div class="prod-badge offer">'+p.offer+'</div>':'')+
      (!p.stock?'<div class="prod-stock-off">Out of Stock</div>':'')+
      '</div>'+
      '<div class="prod-body">'+
        '<div class="prod-cat-tag">'+p.cat+'</div>'+
        '<div class="prod-name">'+p.name+'</div>'+
        '<div class="prod-desc">'+p.desc+'</div>'+
        '<div class="prod-price-row">'+
          '<div><span class="prod-price">﷼ '+p.price.toFixed(2)+'</span>'+(p.oldPrice?'<span class="prod-old-price">﷼ '+p.oldPrice.toFixed(2)+'</span>':'')+
          (disc?'<span class="prod-discount">'+disc+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="prod-actions">'+
          '<div class="toggle-wrap">'+
            '<button class="tog '+(p.stock?'on':'off')+'" onclick="toggleStock('+p.id+')" title="'+(p.stock?'In Stock':'Out of Stock')+'"></button>'+
            '<span class="toggle-lbl">'+(p.stock?'In Stock':'Out of Stock')+'</span>'+
          '</div>'+
          '<button class="btn-edit" onclick="openModal('+p.id+')">✏️ Edit</button>'+
          '<button class="btn-del" onclick="delProduct('+p.id+')" title="Delete">🗑️</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function statCard(icon,bg,lbl,val){
  return '<div class="stat-card"><div class="stat-icon" style="'+bg+'">'+icon+'</div><div><div class="stat-val">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div></div>';
}

function catBg(cat){
  var m={'🍔 Burgers':'#fff3e0','🍕 Pizza':'#fce4ec','🍗 Chicken':'#fff8e1','🥗 Salads':'#e8f5e9','🍟 Sides':'#fff9c4','🥤 Drinks':'#e3f2fd','🍰 Desserts':'#fce4ec','🌮 Wraps':'#f3e5f5','🍜 Pasta':'#fff3e0','🥩 Grills':'#ffebee'};
  return m[cat]||'#f5f5f5';
}

function setCat(c){activeCat=c;renderAdmin();}

// ══ TOGGLE STOCK ══
function toggleStock(id){
  var p=products.find(function(x){return x.id===id;});
  if(p){p.stock=!p.stock;renderAdmin();}
}

// ══ DELETE ══
function delProduct(id){
  if(!confirm('Delete this product?'))return;
  products=products.filter(function(p){return p.id!==id;});
  renderAdmin();
}

// ══ MODAL ══
function openModal(id){
  editingId=id||null;
  var modal=document.getElementById('modalBg');
  modal.classList.add('open');
  document.getElementById('modalTitle').textContent=id?'✏️ Edit Product':'➕ Add New Product';
  document.getElementById('modalErr').style.display='none';

  // Emoji grid
  document.getElementById('emojiGrid').innerHTML=EMOJIS.map(function(e){
    return '<div class="emoji-opt'+(e===selectedEmoji?' selected':'')+'" onclick="selectEmoji(\''+e+'\',this)">'+e+'</div>';
  }).join('');

  if(id){
    var p=products.find(function(x){return x.id===id;});
    if(p){
      selectedEmoji=p.emoji;
      document.getElementById('mName').value=p.name;
      document.getElementById('mCat').value=p.cat;
      document.getElementById('mDesc').value=p.desc;
      document.getElementById('mPrice').value=p.price;
      document.getElementById('mOldPrice').value=p.oldPrice||'';
      document.getElementById('mOffer').value=p.offer||'';
      document.getElementById('mStock').value=p.stock?'1':'0';
      // Re-render emoji grid with selected
      document.getElementById('emojiGrid').innerHTML=EMOJIS.map(function(e){
        return '<div class="emoji-opt'+(e===selectedEmoji?' selected':'')+'" onclick="selectEmoji(\''+e+'\',this)">'+e+'</div>';
      }).join('');
    }
  } else {
    document.getElementById('mName').value='';
    document.getElementById('mCat').value='';
    document.getElementById('mDesc').value='';
    document.getElementById('mPrice').value='';
    document.getElementById('mOldPrice').value='';
    document.getElementById('mOffer').value='';
    document.getElementById('mStock').value='1';
    selectedEmoji='🍔';
  }
}

function selectEmoji(e,el){
  selectedEmoji=e;
  document.querySelectorAll('.emoji-opt').forEach(function(x){x.classList.remove('selected');});
  el.classList.add('selected');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  editingId=null;
}
document.getElementById('modalBg').onclick=function(e){if(e.target===this)closeModal();};

function saveProduct(){
  var name=document.getElementById('mName').value.trim();
  var cat=document.getElementById('mCat').value;
  var desc=document.getElementById('mDesc').value.trim();
  var price=parseFloat(document.getElementById('mPrice').value);
  var oldPrice=parseFloat(document.getElementById('mOldPrice').value)||0;
  var offer=document.getElementById('mOffer').value.trim();
  var stock=document.getElementById('mStock').value==='1';
  var err=document.getElementById('modalErr');
  err.style.display='none';

  if(!name){err.textContent='⚠️ Product name is required.';err.style.display='block';return;}
  if(!cat){err.textContent='⚠️ Please select a category.';err.style.display='block';return;}
  if(!price||price<=0){err.textContent='⚠️ Please enter a valid price.';err.style.display='block';return;}

  if(editingId){
    var p=products.find(function(x){return x.id===editingId;});
    if(p){p.name=name;p.cat=cat;p.desc=desc;p.price=price;p.oldPrice=oldPrice;p.offer=offer;p.stock=stock;p.emoji=selectedEmoji;}
  } else {
    var maxId=products.length?Math.max.apply(null,products.map(function(x){return x.id;})):0;
    products.push({id:maxId+1,name:name,cat:cat,desc:desc,price:price,oldPrice:oldPrice,offer:offer,stock:stock,emoji:selectedEmoji});
  }
  closeModal();
  renderAdmin();
}

// ══ LANDING PAGE ══
function renderLanding(){
  var search=document.getElementById('lsInput')?document.getElementById('lsInput').value.toLowerCase():'';
  var cats=['All'].concat(getCategories().filter(function(c){return c!=='All';}));

  // Category pills
  document.getElementById('landingCats').innerHTML=cats.map(function(c){
    return '<button class="lcat'+(activePageCat===c?' active':'')+'" onclick="setPageCat(\''+c+'\')">'+c+'</button>';
  }).join('');

  // Filter products
  var filtered=products.filter(function(p){
    var mc=activePageCat==='All'||p.cat===activePageCat;
    var ms=!search||p.name.toLowerCase().includes(search)||p.cat.toLowerCase().includes(search);
    return mc&&ms;
  });

  // Group by category for landing
  if(activePageCat==='All'){
    var grouped={};
    filtered.forEach(function(p){
      if(!grouped[p.cat])grouped[p.cat]=[];
      grouped[p.cat].push(p);
    });
    var html='';
    Object.keys(grouped).forEach(function(cat){
      html+='<div class="menu-section-title">'+cat+'<span style="font-size:13px;color:var(--muted);font-weight:500;margin-left:6px;">('+grouped[cat].length+' items)</span></div>';
      html+='<div class="menu-grid">'+grouped[cat].map(menuCard).join('')+'</div>';
    });
    document.getElementById('landingGrid').innerHTML=html||'<div class="empty-state"><div class="ei">🍽️</div><p>No items found</p></div>';
  } else {
    var html='<div class="menu-grid">'+filtered.map(menuCard).join('')+'</div>';
    document.getElementById('landingGrid').innerHTML=html||'<div class="empty-state"><div class="ei">🍽️</div><p>No items in this category</p></div>';
  }
}

function menuCard(p){
  return '<div class="menu-card'+(p.stock?'':' out-of-stock')+'">'+
    '<div class="mc-img" style="background:'+catBg(p.cat)+'">'+p.emoji+
    (p.offer?'<div class="mc-badge">'+p.offer+'</div>':'')+
    (!p.stock?'<div class="mc-out-badge">Out of Stock</div>':'')+
    '</div>'+
    '<div class="mc-body">'+
      '<div class="mc-cat">'+p.cat+'</div>'+
      '<div class="mc-name">'+p.name+'</div>'+
      '<div class="mc-desc">'+p.desc+'</div>'+
      '<div class="mc-footer">'+
        '<div><span class="mc-price">﷼ '+p.price.toFixed(2)+'</span>'+(p.oldPrice?'<span class="mc-old">﷼ '+p.oldPrice.toFixed(2)+'</span>':'')+
        '</div>'+
        '<button class="btn-order" onclick="addToCart(\''+p.name+'\')" '+(p.stock?'':'disabled')+'>'+
          (p.stock?'🛒 Order':'Unavailable')+
        '</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function setPageCat(c){activePageCat=c;renderLanding();}

function addToCart(name){
  var t=document.getElementById('cartToast');
  t.textContent='🛒 '+name+' added to cart!';
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

// Init
renderAdmin();
</script>
</body>
</html>
