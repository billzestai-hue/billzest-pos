<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BillzestPOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #ec4899; --dark: #0f172a; --light: #f8fafc; --text-gray: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .register-container { display: flex; width: 100%; max-width: 1200px; background: white; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; }

        .register-brand { flex: 1; background: linear-gradient(135deg, #0f172a, #4f46e5); padding: 50px; display: flex; flex-direction: column; justify-content: space-between; color: white; }
        .brand-logo { font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .brand-logo div { background: white; color: var(--primary); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .brand-text h1 { font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        .brand-text p { color: #cbd5e1; font-size: 1rem; }

        .register-form-section { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .back-to-login { margin-bottom: 30px; display: inline-flex; align-items: center; gap: 8px; color: var(--text-gray); text-decoration: none; font-weight: 500; }

        .form-header { margin-bottom: 35px; }
        .form-header h2 { font-size: 2rem; color: #0f172a; margin-bottom: 10px; font-weight: 800; }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .form-control { width: 100%; padding: 15px 16px 15px 45px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 1rem; transition: all 0.3s; background: #f8fafc; }
        .form-control:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .btn-register { width: 100%; padding: 16px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3); }

        .login-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-gray); }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85rem; display: none; align-items: center; gap: 8px; }

        @media (max-width: 900px) { .register-brand { display: none; } .register-form-section { padding: 40px; } }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-brand">
            <div class="brand-logo"><div><i data-lucide="store" size="26"></i></div><span>BillzestPOS</span></div>
            <div class="brand-text"><h1>Join Us!</h1><p>Create your account and start managing your restaurant like a pro.</p></div>
            <div style="font-size: 0.75rem; opacity: 0.6;">© 2026 BillzestPOS</div>
        </div>

        <div class="register-form-section">
            <a href="login.html" class="back-to-login"><i data-lucide="arrow-left" size="16"></i> Back to Login</a>
            
            <div class="form-header"><h2>Create Account</h2><p>Get started with BillzestPOS</p></div>

            <div class="error-message" id="errorMsg"><i data-lucide="alert-circle" size="16"></i> <span id="errorText"></span></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" size="18"></i>
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" size="18"></i>
                        <input type="email" id="email" class="form-control" placeholder="admin@restaurant.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" size="18"></i>
                        <input type="password" id="password" class="form-control" placeholder="•••••••• (min 6 characters)" required>
                    </div>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">Create Account</button>
            </form>

            <div class="login-link">Already have an account? <a href="login.html">Sign In</a></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCN0akvFXOHM6WPHv9ve9noqqmauO3TJRY",
            authDomain: "billzest-pos.firebaseapp.com",
            projectId: "billzest-pos",
            storageBucket: "billzest-pos.firebasestorage.app",
            messagingSenderId: "946546876429",
            appId: "1:946546876429:web:9b4a7aa3cecbf3aea83544",
            measurementId: "G-69WEHH9X5D"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        function showError(message) {
            errorText.innerText = message;
            errorMsgDiv.style.display = 'flex';
            setTimeout(() => { errorMsgDiv.style.display = 'none'; }, 4000);
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!name || !email || !password) {
                showError('Please fill all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = 'Creating account...';
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCredential.user, { displayName: name });
                
                localStorage.setItem('user', JSON.stringify({
                    email: email,
                    name: name,
                    uid: userCredential.user.uid
                }));
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/email-already-in-use': errorMessage = 'Email already registered. Please login.'; break;
                    case 'auth/invalid-email': errorMessage = 'Invalid email format'; break;
                    case 'auth/weak-password': errorMessage = 'Password is too weak'; break;
                    default: errorMessage = error.message;
                }
                showError(errorMessage);
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Create Account';
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
