<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BillZest — Product Label Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;color:#1a1a1a;}
:root{--p:#4f2d91;--pd:#3b1f6e;--pl:#f0ebff;--org:#f5a623;--grn:#10b981;--red:#ef4444;--bdr:#e0e0e0;}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--bdr);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-logo{font-size:20px;font-weight:800;color:#1a1a1a;}
.hdr-logo span{color:var(--org);}
.hdr-tabs{display:flex;gap:4px;}
.ht{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#888;font-family:'Poppins',sans-serif;transition:all .2s;}
.ht.on{background:var(--p);color:#fff;}
.ht:hover:not(.on){background:var(--pl);color:var(--p);}

/* PAGES */
.pg{display:none;padding:20px;max-width:1200px;margin:0 auto;}
.pg.on{display:block;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}

/* CONTROLS */
.controls{background:#fff;border-radius:16px;border:1px solid var(--bdr);padding:20px;position:sticky;top:76px;}
.ctrl-title{font-size:15px;font-weight:700;margin-bottom:16px;color:#1a1a1a;padding-bottom:10px;border-bottom:1px solid var(--bdr);}
.ff{margin-bottom:13px;}
.ff label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.ff input,.ff select,.ff textarea{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:13px;font-family:'Poppins',sans-serif;outline:none;color:#1a1a1a;transition:border .2s;background:#fff;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--p);}
.ff textarea{resize:vertical;min-height:60px;font-size:12px;}
.ffr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;flex-shrink:0;}
.color-swatch.on{border-color:#1a1a1a;transform:scale(1.15);}
.btn-gen{width:100%;background:var(--p);color:#fff;border:none;padding:12px;border-radius:9px;font-size:14px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-gen:hover{background:var(--pd);}
.btn-print{width:100%;background:var(--grn);color:#fff;border:none;padding:11px;border-radius:9px;font-size:13px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;margin-top:8px;}
.btn-download{width:100%;background:var(--org);color:#fff;border:none;padding:11px;border-radius:9px;font-size:13px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;margin-top:6px;}

/* LABEL TEMPLATES */
.templates{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.tmpl-btn{padding:8px;border:2px solid var(--bdr);border-radius:8px;cursor:pointer;text-align:center;font-size:11px;font-weight:600;color:#888;background:#fff;font-family:'Poppins',sans-serif;transition:all .2s;}
.tmpl-btn.on{border-color:var(--p);color:var(--p);background:var(--pl);}

/* PREVIEW AREA */
.preview-area{background:#fff;border-radius:16px;border:1px solid var(--bdr);padding:24px;}
.pa-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.pa-title{font-size:16px;font-weight:700;}
.labels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}

/* ══ LABEL DESIGNS ══ */

/* STAMP ROUND */
.label-stamp{width:200px;height:200px;border-radius:50%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;transition:transform .2s;}
.label-stamp:hover{transform:scale(1.05);}
.stamp-outer{position:absolute;inset:0;border-radius:50%;border:4px solid currentColor;}
.stamp-inner{position:absolute;inset:8px;border-radius:50%;border:2px dashed currentColor;opacity:.6;}
.stamp-logo{font-size:13px;font-weight:800;text-align:center;line-height:1.2;z-index:1;}
.stamp-price{font-size:22px;font-weight:800;z-index:1;margin:4px 0;}
.stamp-name{font-size:11px;font-weight:600;text-align:center;z-index:1;max-width:140px;line-height:1.3;}
.stamp-arc-top{position:absolute;top:22px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;z-index:1;}
.stamp-arc-bot{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;letter-spacing:1px;z-index:1;}
.stamp-stars{font-size:10px;z-index:1;letter-spacing:2px;}

/* LABEL RECTANGLE */
.label-rect{width:220px;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s;margin:0 auto;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.label-rect:hover{transform:scale(1.03);}
.lr-top{padding:14px 16px 10px;text-align:center;}
.lr-logo{font-size:13px;font-weight:800;opacity:.9;margin-bottom:6px;}
.lr-name{font-size:16px;font-weight:800;line-height:1.2;}
.lr-divider{height:2px;margin:0 16px;opacity:.4;}
.lr-body{padding:10px 16px 14px;text-align:center;}
.lr-price{font-size:28px;font-weight:800;}
.lr-desc{font-size:10px;opacity:.8;margin-top:4px;line-height:1.5;}
.lr-footer{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-size:10px;}
.lr-barcode{font-family:'Courier New',monospace;font-size:9px;letter-spacing:3px;opacity:.6;}

/* LABEL ELEGANT */
.label-elegant{width:220px;border-radius:4px;overflow:hidden;cursor:pointer;transition:transform .2s;margin:0 auto;position:relative;}
.label-elegant:hover{transform:scale(1.03);}
.le-border{position:absolute;inset:6px;border:1px solid rgba(255,255,255,.3);border-radius:2px;pointer-events:none;}
.le-corner{position:absolute;width:14px;height:14px;border-color:currentColor;border-style:solid;}
.le-tl{top:10px;left:10px;border-width:2px 0 0 2px;}
.le-tr{top:10px;right:10px;border-width:2px 2px 0 0;}
.le-bl{bottom:10px;left:10px;border-width:0 0 2px 2px;}
.le-br{bottom:10px;right:10px;border-width:0 2px 2px 0;}
.le-content{padding:20px 18px;text-align:center;position:relative;z-index:1;}
.le-brand{font-size:10px;letter-spacing:4px;text-transform:uppercase;opacity:.7;margin-bottom:8px;}
.le-name{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:6px;font-family:'Playfair Display',serif;}
.le-line{height:1px;background:currentColor;opacity:.3;margin:10px auto;width:60px;}
.le-price{font-size:26px;font-weight:800;margin-bottom:4px;}
.le-sub{font-size:10px;opacity:.6;letter-spacing:1px;}

/* LABEL MODERN */
.label-modern{width:220px;border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s;margin:0 auto;box-shadow:0 6px 20px rgba(0,0,0,.15);}
.label-modern:hover{transform:scale(1.03);}
.lm-accent{height:6px;width:100%;}
.lm-body{padding:16px;}
.lm-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.lm-name{font-size:17px;font-weight:800;line-height:1.2;margin-bottom:6px;}
.lm-desc{font-size:11px;opacity:.7;line-height:1.5;margin-bottom:12px;}
.lm-footer{display:flex;align-items:center;justify-content:space-between;}
.lm-price{font-size:24px;font-weight:800;}
.lm-logo-sm{font-size:11px;font-weight:700;opacity:.6;}

/* LABEL ARABIC */
.label-arabic{width:220px;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s;margin:0 auto;direction:rtl;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.label-arabic:hover{transform:scale(1.03);}
.la-top{padding:16px;text-align:center;}
.la-name{font-size:18px;font-weight:800;font-family:'Tajawal',sans-serif;margin-bottom:4px;}
.la-brand{font-size:11px;font-family:'Tajawal',sans-serif;opacity:.8;}
.la-price{font-size:28px;font-weight:800;font-family:'Tajawal',sans-serif;padding:8px 16px;text-align:center;}
.la-footer{padding:8px 16px;font-size:10px;font-family:'Tajawal',sans-serif;opacity:.7;text-align:center;}

/* STAMP WAX */
.label-wax{width:180px;height:180px;border-radius:50%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;transition:transform .2s;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.label-wax:hover{transform:scale(1.05);}
.wax-ring{position:absolute;inset:0;border-radius:50%;}
.wax-ring::before{content:'';position:absolute;inset:10px;border-radius:50%;border:2px solid rgba(255,255,255,.3);}
.wax-ring::after{content:'';position:absolute;inset:18px;border-radius:50%;border:1px dashed rgba(255,255,255,.2);}
.wax-bz{font-size:32px;font-weight:800;color:#fff;font-family:'Playfair Display',serif;z-index:1;line-height:1;}
.wax-sub{font-size:9px;color:rgba(255,255,255,.8);letter-spacing:3px;text-transform:uppercase;z-index:1;margin-top:2px;}
.wax-bottom{position:absolute;bottom:28px;font-size:10px;color:rgba(255,255,255,.7);z-index:1;}

/* PRINT STYLES */
@media print{
  .hdr,.controls,.pa-header button,.btn-print,.btn-download,.btn-gen,.ht{display:none!important;}
  .pg,.layout,.preview-area{padding:0!important;margin:0!important;border:none!important;box-shadow:none!important;}
  body{background:#fff;}
  .labels-grid{grid-template-columns:repeat(3,1fr);}
}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:28px;font-size:12px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:900px){.layout{grid-template-columns:1fr;}.controls{position:static;}}
@media(max-width:500px){.labels-grid{grid-template-columns:1fr 1fr;}.pg{padding:12px;}.templates{grid-template-columns:1fr 1fr 1fr;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">Bill<span>Zest</span></div>
  <div class="hdr-tabs">
    <button class="ht on" onclick="goTab('design',this)">🎨 Design</button>
    <button class="ht" onclick="goTab('gallery',this)">📁 Gallery</button>
  </div>
</div>

<!-- DESIGN TAB -->
<div class="pg on" id="pg-design">
  <div class="layout">

    <!-- CONTROLS -->
    <div class="controls">
      <div class="ctrl-title">⚙️ Label Settings</div>

      <div class="ff">
        <label>Label Style</label>
        <div class="templates">
          <button class="tmpl-btn on" onclick="setStyle('stamp',this)">🔵 Stamp</button>
          <button class="tmpl-btn" onclick="setStyle('rect',this)">📦 Box</button>
          <button class="tmpl-btn" onclick="setStyle('elegant',this)">✨ Elegant</button>
          <button class="tmpl-btn" onclick="setStyle('modern',this)">🔷 Modern</button>
          <button class="tmpl-btn" onclick="setStyle('arabic',this)">🇸🇦 Arabic</button>
          <button class="tmpl-btn" onclick="setStyle('wax',this)">🔴 Wax Seal</button>
        </div>
      </div>

      <div class="ff">
        <label>Product Name *</label>
        <input type="text" id="pName" placeholder="e.g. Classic Burger" oninput="updateLabels()" value="Classic Burger">
      </div>

      <div class="ffr">
        <div class="ff">
          <label>Price (﷼)</label>
          <input type="number" id="pPrice" placeholder="32" value="32" oninput="updateLabels()">
        </div>
        <div class="ff">
          <label>Category</label>
          <select id="pCat" onchange="updateLabels()">
            <option>🍔 Burgers</option>
            <option>🍕 Pizza</option>
            <option>🍗 Chicken</option>
            <option>🥩 Grills</option>
            <option>🥤 Drinks</option>
            <option>🍰 Desserts</option>
            <option>🍽️ Other</option>
          </select>
        </div>
      </div>

      <div class="ff">
        <label>Description</label>
        <textarea id="pDesc" placeholder="Short description..." oninput="updateLabels()">Fresh & Delicious</textarea>
      </div>

      <div class="ffr">
        <div class="ff">
          <label>Arabic Name</label>
          <input type="text" id="pNameAr" placeholder="برجر كلاسيك" oninput="updateLabels()" value="برجر كلاسيك">
        </div>
        <div class="ff">
          <label>Copies</label>
          <select id="pCopies" onchange="updateLabels()">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="4">4</option>
            <option value="6">6</option>
            <option value="9">9</option>
          </select>
        </div>
      </div>

      <div class="ff">
        <label>Color Theme</label>
        <div class="color-row" id="colorRow"></div>
      </div>

      <button class="btn-gen" onclick="updateLabels()">🔄 Generate Labels</button>
      <button class="btn-print" onclick="printLabels()">🖨️ Print Labels</button>
      <button class="btn-download" onclick="downloadLabels()">📥 Save as PDF</button>
    </div>

    <!-- PREVIEW -->
    <div class="preview-area" id="previewArea">
      <div class="pa-header">
        <div class="pa-title">👁️ Label Preview</div>
        <span style="font-size:12px;color:#aaa;" id="labelCount">2 labels</span>
      </div>
      <div class="labels-grid" id="labelsGrid"></div>
    </div>

  </div>
</div>

<!-- GALLERY TAB -->
<div class="pg" id="pg-gallery">
  <div style="background:#fff;border-radius:16px;border:1px solid var(--bdr);padding:24px;">
    <div style="font-size:16px;font-weight:700;margin-bottom:20px;">📁 Saved Labels Gallery</div>
    <div id="galleryGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ DATA ══
var currentStyle = "stamp";
var savedLabels = [];
var COLORS = [
  {name:"Purple",bg:"#4f2d91",text:"#fff",accent:"#f5a623"},
  {name:"Black",bg:"#1a1a1a",text:"#fff",accent:"#f5a623"},
  {name:"Red",bg:"#dc2626",text:"#fff",accent:"#fff"},
  {name:"Green",bg:"#059669",text:"#fff",accent:"#fff"},
  {name:"Blue",bg:"#1d4ed8",text:"#fff",accent:"#fbbf24"},
  {name:"Orange",bg:"#ea580c",text:"#fff",accent:"#fff"},
  {name:"Teal",bg:"#0d9488",text:"#fff",accent:"#fff"},
  {name:"Gold",bg:"#92400e",text:"#fff",accent:"#fbbf24"},
  {name:"White",bg:"#fff",text:"#1a1a1a",accent:"#4f2d91"},
];
var activeColor = 0;

// ══ INIT COLORS ══
function initColors(){
  document.getElementById("colorRow").innerHTML = COLORS.map(function(c,i){
    return "<div class='color-swatch"+(i===0?" on":"")+"' style='background:"+c.bg+";border-color:"+(i===0?"#1a1a1a":"transparent")+"' onclick='setColor("+i+",this)' title='"+c.name+"'></div>";
  }).join("");
}

function setColor(i, el){
  activeColor = i;
  document.querySelectorAll(".color-swatch").forEach(function(s){s.classList.remove("on");s.style.borderColor="transparent";});
  el.classList.add("on");
  el.style.borderColor="#1a1a1a";
  updateLabels();
}

// ══ STYLE ══
function setStyle(s, btn){
  currentStyle = s;
  document.querySelectorAll(".tmpl-btn").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  updateLabels();
}

// ══ GENERATE LABELS ══
function updateLabels(){
  var name = document.getElementById("pName").value || "Product Name";
  var price = document.getElementById("pPrice").value || "0";
  var cat = document.getElementById("pCat").value;
  var desc = document.getElementById("pDesc").value || "";
  var nameAr = document.getElementById("pNameAr").value || "";
  var copies = parseInt(document.getElementById("pCopies").value) || 2;
  var col = COLORS[activeColor];

  document.getElementById("labelCount").textContent = copies+" label"+(copies>1?"s":"");

  var labelHTML = generateLabel(name, price, cat, desc, nameAr, col);
  var html = "";
  for(var i=0; i<copies; i++){
    html += "<div>"+labelHTML+"</div>";
  }
  document.getElementById("labelsGrid").innerHTML = html;
}

function generateLabel(name, price, cat, desc, nameAr, col){
  var bz = "BillZest";
  var s = currentStyle;

  if(s === "stamp"){
    return "<div class='label-stamp' style='color:"+col.bg+";background:"+col.bg+"20;' onclick='showToast(\"✅ Stamp label selected!\")'>"+
      "<div class='stamp-outer'></div>"+
      "<div class='stamp-inner'></div>"+
      "<div class='stamp-arc-top' style='color:"+col.bg+";'>★ "+bz.toUpperCase()+" ★</div>"+
      "<div class='stamp-stars' style='color:"+col.accent+";'>★ ★ ★</div>"+
      "<div class='stamp-logo' style='color:"+col.bg+";'>"+cat.split(" ")[0]+"</div>"+
      "<div class='stamp-price' style='color:"+col.bg+";'>﷼ "+price+"</div>"+
      "<div class='stamp-name' style='color:"+col.bg+";'>"+name+"</div>"+
      "<div class='stamp-arc-bot' style='color:"+col.bg+";'>"+desc.substring(0,20)+"</div>"+
    "</div>";
  }

  if(s === "rect"){
    return "<div class='label-rect' onclick='showToast(\"✅ Box label selected!\")'>" +
      "<div class='lr-top' style='background:"+col.bg+";color:"+col.text+";'>"+
        "<div class='lr-logo'>"+bz+"</div>"+
        "<div class='lr-name'>"+name+"</div>"+
      "</div>"+
      "<div class='lr-divider' style='background:"+col.bg+";'></div>"+
      "<div class='lr-body' style='background:"+col.bg+"15;'>"+
        "<div class='lr-price' style='color:"+col.bg+";'>﷼ "+price+"</div>"+
        "<div class='lr-desc'>"+desc+"</div>"+
        (nameAr?"<div style='font-family:Tajawal,sans-serif;font-size:13px;font-weight:700;margin-top:6px;color:"+col.bg+";'>"+nameAr+"</div>":"")+
      "</div>"+
      "<div class='lr-footer' style='background:"+col.bg+";color:"+col.text+";'>"+
        "<span>"+cat+"</span>"+
        "<span class='lr-barcode'>||| ||| |||</span>"+
      "</div>"+
    "</div>";
  }

  if(s === "elegant"){
    return "<div class='label-elegant' style='background:"+col.bg+";' onclick='showToast(\"✅ Elegant label selected!\")'>"+
      "<div class='le-border'></div>"+
      "<div class='le-corner le-tl' style='color:"+col.accent+";'></div>"+
      "<div class='le-corner le-tr' style='color:"+col.accent+";'></div>"+
      "<div class='le-corner le-bl' style='color:"+col.accent+";'></div>"+
      "<div class='le-corner le-br' style='color:"+col.accent+";'></div>"+
      "<div class='le-content' style='color:"+col.text+";'>"+
        "<div class='le-brand'>— "+bz.toUpperCase()+" —</div>"+
        "<div class='le-name'>"+name+"</div>"+
        "<div class='le-line' style='background:"+col.text+";'></div>"+
        "<div class='le-price' style='color:"+col.accent+";'>﷼ "+price+"</div>"+
        "<div class='le-sub'>"+cat+" · "+desc.substring(0,20)+"</div>"+
        (nameAr?"<div style='font-family:Tajawal,sans-serif;font-size:14px;margin-top:8px;opacity:.9;'>"+nameAr+"</div>":"")+
      "</div>"+
    "</div>";
  }

  if(s === "modern"){
    return "<div class='label-modern' style='background:"+col.bg+"15;' onclick='showToast(\"✅ Modern label selected!\")'>"+
      "<div class='lm-accent' style='background:"+col.bg+";'></div>"+
      "<div class='lm-body' style='color:"+col.bg+";'>"+
        "<div class='lm-tag' style='background:"+col.bg+";color:"+col.text+";'>"+cat.split(" ")[1]||"Food"+"</div>"+
        "<div class='lm-name' style='color:#1a1a1a;'>"+name+"</div>"+
        (nameAr?"<div style='font-family:Tajawal,sans-serif;font-size:13px;color:#555;margin-bottom:4px;'>"+nameAr+"</div>":"")+
        "<div class='lm-desc'>"+desc+"</div>"+
        "<div class='lm-footer'>"+
          "<div class='lm-price' style='color:"+col.bg+";'>﷼ "+price+"</div>"+
          "<div class='lm-logo-sm'>"+bz+"</div>"+
        "</div>"+
      "</div>"+
    "</div>";
  }

  if(s === "arabic"){
    return "<div class='label-arabic' onclick='showToast(\"✅ Arabic label selected!\")'>"+
      "<div class='la-top' style='background:"+col.bg+";color:"+col.text+";'>"+
        "<div class='la-name'>"+nameAr+"</div>"+
        "<div class='la-brand'>"+bz+"</div>"+
      "</div>"+
      "<div class='la-price' style='background:"+col.bg+"15;color:"+col.bg+";'>﷼ "+price+"</div>"+
      "<div class='la-footer' style='background:"+col.bg+";color:"+col.text+";'>"+cat+" · "+desc.substring(0,15)+"</div>"+
    "</div>";
  }

  if(s === "wax"){
    return "<div class='label-wax' style='background:radial-gradient(circle at 35% 35%, "+col.bg+"dd, "+col.bg+");' onclick='showToast(\"✅ Wax seal selected!\")'>"+
      "<div class='wax-ring'></div>"+
      "<div class='wax-bz'>BZ</div>"+
      "<div class='wax-sub'>"+bz.toUpperCase()+"</div>"+
      "<div style='color:rgba(255,255,255,.5);font-size:16px;z-index:1;margin:4px 0;letter-spacing:2px;'>★</div>"+
      "<div style='font-size:18px;font-weight:800;color:#fff;z-index:1;'>﷼ "+price+"</div>"+
      "<div class='wax-bottom'>"+name.substring(0,14)+"</div>"+
    "</div>";
  }

  return "<div>Label</div>";
}

// ══ TABS ══
function goTab(t, btn){
  document.querySelectorAll(".ht").forEach(function(b){b.classList.remove("on");});
  btn.classList.add("on");
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on");});
  document.getElementById("pg-"+t).classList.add("on");
  if(t==="gallery") renderGallery();
}

// ══ SAVE TO GALLERY ══
function saveToGallery(){
  var name = document.getElementById("pName").value||"Product";
  var price = document.getElementById("pPrice").value||"0";
  var col = COLORS[activeColor];
  savedLabels.push({
    id: Date.now(), name: name, price: price,
    style: currentStyle, colorIdx: activeColor,
    html: document.getElementById("labelsGrid").querySelector("div").innerHTML
  });
  showToast("💾 Saved to gallery!");
}

function renderGallery(){
  if(!savedLabels.length){
    document.getElementById("galleryGrid").innerHTML =
      "<div style='grid-column:1/-1;text-align:center;padding:40px;color:#aaa;'>"+
        "<div style='font-size:48px;margin-bottom:10px;'>📁</div>"+
        "<div style='font-size:14px;font-weight:600;'>No saved labels yet</div>"+
        "<div style='font-size:12px;margin-top:4px;'>Design and save labels from the Design tab</div>"+
      "</div>";
    return;
  }
  document.getElementById("galleryGrid").innerHTML = savedLabels.map(function(l){
    return "<div style='background:#f8f8f8;border-radius:12px;padding:16px;text-align:center;'>"+
      l.html+
      "<div style='font-size:12px;font-weight:600;margin-top:10px;'>"+l.name+"</div>"+
      "<div style='font-size:11px;color:#aaa;'>﷼ "+l.price+" · "+l.style+"</div>"+
    "</div>";
  }).join("");
}

// ══ PRINT ══
function printLabels(){
  saveToGallery();
  showToast("🖨️ Sending to printer...");
  setTimeout(function(){window.print();},500);
}

function downloadLabels(){
  saveToGallery();
  showToast("📥 Labels saved to gallery!");
}

// ══ TOAST ══
function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

// ══ INIT ══
initColors();
updateLabels();
</script>
</body>
</html>
