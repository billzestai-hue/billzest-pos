<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - BillzestPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .error-card{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:28px;padding:50px;text-align:center;max-width:500px;width:100%;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)}
        .error-icon{width:100px;height:100px;background:rgba(79,70,229,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 25px;color:#4f46e5}
        .error-code{font-size:6rem;font-weight:800;background:linear-gradient(135deg,#4f46e5,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
        h1{font-size:1.5rem;margin:20px 0 10px;color:#1e293b}
        p{color:#64748b;margin-bottom:30px}
        .btn-group{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
        .btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,#4f46e5,#ec4899);color:white;text-decoration:none;border-radius:40px;font-weight:500;transition:transform 0.3s}
        .btn-primary:hover{transform:translateY(-2px)}
        .btn-outline{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:transparent;border:2px solid #4f46e5;color:#4f46e5;text-decoration:none;border-radius:40px;font-weight:500;transition:all 0.3s}
        .btn-outline:hover{background:#4f46e5;color:white}
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i data-lucide="file-question" size="48"></i></div>
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Oops! The page you are looking for doesn't exist or has been moved.</p>
        <div class="btn-group">
            <a href="index.html" class="btn-primary"><i data-lucide="home" size="18"></i> Home</a>
            <a href="javascript:history.back()" class="btn-outline"><i data-lucide="arrow-left" size="18"></i> Go Back</a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
