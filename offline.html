<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline - Billzestpos</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --secondary: #ec4899; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; color: white; }

        .content { max-width: 480px; }
        .wifi-icon { font-size: 5rem; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; transform: scale(1); } 50% { opacity:0.5; transform: scale(0.95); } }

        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 14px; }
        p { color: rgba(255,255,255,0.65); font-size: 1rem; line-height: 1.7; margin-bottom: 36px; }

        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 15px 32px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.3s; box-shadow: 0 10px 25px rgba(79,70,229,0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(79,70,229,0.4); }

        .status { margin-top: 30px; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: blink 1s ease-in-out infinite; margin-right: 6px; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    </style>
</head>
<body>
    <div class="content">
        <div class="wifi-icon">📡</div>
        <h1>You're Offline</h1>
        <p>It looks like your internet connection is down. Some features may not be available. Cached pages will still load.</p>
        <button class="btn" onclick="window.location.reload()">
            🔄 Try Again
        </button>
        <div class="status"><span class="status-dot"></span>No internet connection detected</div>
    </div>

    <script>
        // Auto-reload when connection restores
        window.addEventListener('online', () => window.location.reload());
    </script>
</body>
</html>
