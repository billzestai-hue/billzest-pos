<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - BillzestPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .offline-card{background:white;border-radius:28px;padding:50px;text-align:center;max-width:500px;width:100%;box-shadow:0 20px 40px rgba(0,0,0,0.1)}
        .offline-icon{width:100px;height:100px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 25px;color:#ef4444}
        h1{font-size:1.5rem;margin:20px 0 10px;color:#1e293b}
        p{color:#64748b;margin-bottom:30px;line-height:1.6}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#4f46e5;color:white;border:none;border-radius:40px;font-weight:500;cursor:pointer;transition:transform 0.3s}
        .btn:hover{transform:translateY(-2px);background:#4338ca}
        .saved-data{background:#f8fafc;padding:15px;border-radius:16px;margin-top:20px;text-align:left}
        .saved-data h4{color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:8px}
        .saved-data ul{list-style:none;margin-left:25px}
        .saved-data li{color:#475569;font-size:0.85rem;margin:5px 0;display:flex;align-items:center;gap:8px}
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon"><i data-lucide="wifi-off" size="48"></i></div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again. Don't worry, your data is safe!</p>
        <button class="btn" onclick="location.reload()"><i data-lucide="refresh-cw" size="18"></i> Retry Connection</button>
        <div class="saved-data">
            <h4><i data-lucide="database" size="16"></i> Saved Offline Data</h4>
            <ul id="offlineDataList">
                <li><i data-lucide="shopping-cart" size="14"></i> No saved orders</li>
            </ul>
        </div>
    </div>
    <script>
        lucide.createIcons();
        const savedOrders = localStorage.getItem('pendingOrders');
        if(savedOrders) {
            const orders = JSON.parse(savedOrders);
            if(orders.length > 0) {
                document.getElementById('offlineDataList').innerHTML = orders.map(o => `<li><i data-lucide="receipt" size="14"></i> Order #${o.id || 'pending'} - $${o.total}</li>`).join('');
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
