<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display - BillzestPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f172a; padding: 20px; }
        .kds-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .kds-header h1 { color: white; font-size: 1.8rem; }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { background: #1e293b; color: #94a3b8; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 500; }
        .filter-btn.active, .filter-btn:hover { background: #4f46e5; color: white; }
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .order-card { background: white; border-radius: 20px; padding: 20px; border-left: 5px solid #f59e0b; transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
        .order-id { font-weight: 800; color: #4f46e5; }
        .order-time { color: #64748b; font-size: 0.8rem; }
        .order-items { margin: 15px 0; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
        .status-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .status-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-cooking { background: #dbeafe; color: #4f46e5; }
        .status-ready { background: #d1fae5; color: #065f46; }
        .status-btn:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .no-orders { text-align: center; color: #64748b; padding: 50px; background: #1e293b; border-radius: 20px; }
        @media (max-width: 768px) { .orders-grid { grid-template-columns: 1fr; } .kds-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <div class="kds-header"><h1>🍳 Kitchen Display System</h1><div class="filters"><button class="filter-btn active" data-filter="all">All</button><button class="filter-btn" data-filter="pending">Pending ⏳</button><button class="filter-btn" data-filter="cooking">Cooking 🔥</button><button class="filter-btn" data-filter="ready">Ready ✅</button></div></div>
    <div id="ordersGrid" class="orders-grid"><div class="no-orders">Loading orders...</div></div>
    <script>
        let orders = JSON.parse(localStorage.getItem('kitchen_orders') || '[]');
        let currentFilter = 'all';
        
        function initSampleOrders() { if(orders.length === 0) { orders = [{ id: '#ORD-001', items: [{name:'Burger',qty:2},{name:'Fries',qty:1}], total: 21.50, status: 'pending', time: new Date().toLocaleTimeString(), table: 'Table 4' },{ id: '#ORD-002', items: [{name:'Pizza',qty:1},{name:'Cola',qty:2}], total: 16.00, status: 'cooking', time: new Date().toLocaleTimeString(), table: 'Table 2' }]; localStorage.setItem('kitchen_orders', JSON.stringify(orders)); } }
        initSampleOrders();
        
        function updateOrderStatus(orderId, newStatus) { orders = orders.map(o => o.id === orderId ? { ...o, status: newStatus } : o); localStorage.setItem('kitchen_orders', JSON.stringify(orders)); renderOrders(); }
        function renderOrders() { const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter); const grid = document.getElementById('ordersGrid'); if(filtered.length === 0) { grid.innerHTML = '<div class="no-orders">✨ No orders in this category</div>'; return; } grid.innerHTML = filtered.map(order => `<div class="order-card"><div class="order-header"><span class="order-id">${order.id}</span><span class="order-time">${order.time} | ${order.table || 'Table'}</span></div><div class="order-items">${order.items.map(item => `<div class="order-item"><span>${item.name} x${item.qty}</span><span>$${(item.price || 8) * item.qty}</span></div>`).join('')}</div><div class="status-buttons"><button class="status-btn status-pending" onclick="updateOrderStatus('${order.id}','pending')">⏳ Pending</button><button class="status-btn status-cooking" onclick="updateOrderStatus('${order.id}','cooking')">🔥 Cooking</button><button class="status-btn status-ready" onclick="updateOrderStatus('${order.id}','ready')">✅ Ready</button></div></div>`).join(''); }
        
        document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.getAttribute('data-filter'); renderOrders(); }); });
        renderOrders(); setInterval(() => { const newOrders = JSON.parse(localStorage.getItem('kitchen_orders') || '[]'); if(JSON.stringify(newOrders) !== JSON.stringify(orders)) { orders = newOrders; renderOrders(); } }, 2000);
        window.updateOrderStatus = updateOrderStatus;
    </script>
</body>
</html>
