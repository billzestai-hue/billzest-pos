<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Request - BillzestPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #ec4899; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .payment-container { background: white; border-radius: 28px; padding: 40px; max-width: 550px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .payment-header { text-align: center; margin-bottom: 30px; }
        .payment-header .icon { background: linear-gradient(135deg, #667eea, #764ba2); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .payment-header h2 { color: #1e293b; margin-bottom: 8px; font-size: 1.8rem; }
        .payment-header p { color: #64748b; }
        .plan-badge { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 8px 20px; border-radius: 30px; display: inline-block; margin-top: 15px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 0.9rem; }
        .form-group label .required { color: #ef4444; }
        .form-control { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 1rem; transition: all 0.3s; background: #f8fafc; }
        .form-control:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-pay { width: 100%; padding: 16px; background: linear-gradient(135deg, #25d366, #128C7E); color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37,211,102,0.3); }
        .btn-pay:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .whatsapp-info { background: #e8f5e9; padding: 15px; border-radius: 16px; margin-top: 25px; text-align: center; border: 1px solid #25d366; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .whatsapp-info p { color: #2e7d32; font-size: 0.85rem; }
        .success-message { background: #d1fae5; color: #065f46; padding: 14px; border-radius: 14px; margin-bottom: 20px; display: none; align-items: center; gap: 10px; }
        .loading { display: none; width: 20px; height: 20px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .back-link a:hover { color: var(--primary); }
        .info-note { background: #fef3c7; padding: 12px; border-radius: 12px; margin-top: 15px; font-size: 0.8rem; color: #92400e; display: flex; align-items: center; gap: 8px; }
        @media (max-width: 500px) { .payment-container { padding: 25px; } .row-2 { grid-template-columns: 1fr; gap: 0; } }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <div class="icon"><i data-lucide="message-circle" size="36" color="white"></i></div>
            <h2>Complete Your Payment</h2>
            <div class="plan-badge" id="planBadge">Professional Plan - $79/month</div>
        </div>

        <div id="successMsg" class="success-message">
            <i data-lucide="check-circle" size="18"></i>
            <span id="successText"></span>
        </div>

        <form id="paymentForm">
            <div class="row-2">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="fullName" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" class="form-control" required placeholder="+1 234 567 890">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address <span class="required">*</span></label>
                <input type="email" id="email" class="form-control" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Restaurant Name</label>
                <input type="text" id="restaurantName" class="form-control" placeholder="Your Restaurant Name">
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>GST Number (if registered)</label>
                    <input type="text" id="gstNumber" class="form-control" placeholder="22AAAAA0000A1Z">
                </div>
                <div class="form-group">
                    <label>Business Address</label>
                    <input type="text" id="address" class="form-control" placeholder="City, State, Pincode">
                </div>
            </div>
            <div class="form-group">
                <label>Additional Notes (Optional)</label>
                <textarea id="notes" class="form-control" rows="2" placeholder="Any special requirements?"></textarea>
            </div>
            <button type="submit" class="btn-pay" id="payBtn">
                <i data-lucide="message-circle" size="18"></i>
                Request Payment & Get Invoice
                <div class="loading" id="loading"></div>
            </button>
        </form>

        <div class="whatsapp-info">
            <i data-lucide="shield-check" size="20" color="#25d366"></i>
            <p>We'll send GST invoice to your email after payment confirmation!</p>
        </div>
        
        <div class="info-note">
            <i data-lucide="info" size="16"></i>
            <span>GST invoice will be sent to your email address within 24 hours of payment.</span>
        </div>
        
        <div class="back-link">
            <a href="pricing.html">← Back to Pricing</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ========== 🔥🔴🔥 YAHAN APNI VALUES DAALO 🔥🔴🔥 ==========
        // Step 1: EmailJS pe account banao: https://www.emailjs.com
        // Step 2: Email Service connect karo (Gmail)
        // Step 3: Email Template banao
        // Step 4: API Keys copy karo
        
        const EMAILJS_CONFIG = {
            PUBLIC_KEY: "YOUR_EMAILJS_PUBLIC_KEY",     // 🔴 YAHAN PUBLIC KEY DAALO
            SERVICE_ID: "YOUR_SERVICE_ID",              // 🔴 YAHAN SERVICE ID DAALO
            TEMPLATE_ID: "YOUR_TEMPLATE_ID"             // 🔴 YAHAN TEMPLATE ID DAALO
        };
        
        // Apna WhatsApp number (country code ke saath)
        // India: 91XXXXXXXXXX (example: 919876543210)
        // Saudi: 966XXXXXXXXX (example: 966550898978)
        const ADMIN_WHATSAPP = "919876543210";  // 🔴 YAHAN APNA NUMBER DAALO
        // ==========================================================

        // Initialize EmailJS
        if (EMAILJS_CONFIG.PUBLIC_KEY !== "YOUR_EMAILJS_PUBLIC_KEY") {
            emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
        }

        // Get plan info from URL
        const urlParams = new URLSearchParams(window.location.search);
        const planName = urlParams.get('plan') || 'Professional';
        const planPrice = urlParams.get('price') || '79';
        const billingCycle = urlParams.get('billing') || 'monthly';

        document.getElementById('planBadge').innerHTML = `${planName} Plan - $${planPrice}/${billingCycle === 'yearly' ? 'year' : 'month'}`;

        // Save to localStorage
        function saveToLocal(customerData) {
            let pendingPayments = JSON.parse(localStorage.getItem('pendingPayments') || '[]');
            pendingPayments.push({
                ...customerData,
                id: Date.now(),
                timestamp: new Date().toISOString(),
                status: 'pending'
            });
            localStorage.setItem('pendingPayments', JSON.stringify(pendingPayments));
        }

        // Save customer data
        function saveCustomerData(customerData) {
            let customers = JSON.parse(localStorage.getItem('registered_customers') || '[]');
            const existing = customers.find(c => c.email === customerData.email);
            if (!existing) {
                customers.push({
                    ...customerData,
                    registeredAt: new Date().toISOString()
                });
                localStorage.setItem('registered_customers', JSON.stringify(customers));
            }
        }

        // Format WhatsApp message
        function formatWhatsAppMessage(customerData) {
            return `🆕 *NEW PAYMENT REQUEST* 🆕
━━━━━━━━━━━━━━━━━━━━━━
👤 *Customer:* ${customerData.fullName}
📧 *Email:* ${customerData.email}
📱 *Phone:* ${customerData.phone}
🏪 *Restaurant:* ${customerData.restaurantName || 'Not specified'}
📦 *Plan:* ${customerData.plan}
💰 *Amount:* $${customerData.amount}
🔄 *Billing:* ${customerData.billing}
🏢 *GST:* ${customerData.gstNumber || 'Not provided'}
📍 *Address:* ${customerData.address || 'Not provided'}
💬 *Notes:* ${customerData.notes || 'No additional notes'}
⏰ *Time:* ${new Date().toLocaleString()}
━━━━━━━━━━━━━━━━━━━━━━
🔗 Reply to process payment
📞 Contact: ${customerData.phone}`;
        }

        // Send WhatsApp message
        function sendWhatsAppMessage(message) {
            const whatsappUrl = `https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            return true;
        }

        // Send email invoice via EmailJS
        async function sendEmailInvoice(customerData, subscriptionData) {
            // Check if EmailJS is configured
            if (EMAILJS_CONFIG.PUBLIC_KEY === "YOUR_EMAILJS_PUBLIC_KEY") {
                console.log("EmailJS not configured yet - skipping email");
                return false;
            }
            
            const subtotal = parseFloat(subscriptionData.amount);
            const gstPercent = 18;
            const gstAmount = (subtotal * gstPercent) / 100;
            const totalAmount = subtotal + gstAmount;
            const invoiceNo = `INV-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
            
            const templateParams = {
                customer_name: customerData.fullName,
                customer_email: customerData.email,
                customer_phone: customerData.phone,
                customer_gst: customerData.gstNumber || 'Not registered',
                customer_address: customerData.address || 'Not provided',
                invoice_no: invoiceNo,
                date: new Date().toLocaleDateString('en-IN'),
                plan_name: subscriptionData.plan,
                billing_cycle: subscriptionData.billing,
                amount: subtotal.toFixed(2),
                gst_percent: gstPercent,
                gst_amount: gstAmount.toFixed(2),
                total_amount: totalAmount.toFixed(2),
                company_name: "BillzestPOS",
                company_gst: "22AAAAA0000A1Z",
                company_email: "billing@billzestpos.com",
                status: "pending_payment"
            };
            
            try {
                const response = await emailjs.send(
                    EMAILJS_CONFIG.SERVICE_ID,
                    EMAILJS_CONFIG.TEMPLATE_ID,
                    templateParams
                );
                console.log("Invoice email sent:", response);
                return true;
            } catch (error) {
                console.error("Email error:", error);
                return false;
            }
        }

        const form = document.getElementById('paymentForm');
        const payBtn = document.getElementById('payBtn');
        const loading = document.getElementById('loading');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const restaurantName = document.getElementById('restaurantName').value;
            const gstNumber = document.getElementById('gstNumber').value;
            const address = document.getElementById('address').value;
            const notes = document.getElementById('notes').value;

            if (!fullName || !email || !phone) {
                alert('❌ Please fill all required fields');
                return;
            }

            const customerData = {
                fullName: fullName,
                email: email,
                phone: phone,
                restaurantName: restaurantName || 'Not specified',
                gstNumber: gstNumber || '',
                address: address || '',
                notes: notes || '',
                plan: planName,
                amount: planPrice,
                billing: billingCycle
            };

            payBtn.disabled = true;
            loading.style.display = 'inline-block';
            payBtn.innerHTML = 'Processing...';

            try {
                // 1. Send email invoice (if configured)
                const emailSent = await sendEmailInvoice(customerData, {
                    plan: planName,
                    amount: planPrice,
                    billing: billingCycle
                });
                
                // 2. Send WhatsApp notification
                const message = formatWhatsAppMessage(customerData);
                sendWhatsAppMessage(message);
                
                // 3. Save data locally
                saveToLocal(customerData);
                saveCustomerData(customerData);
                
                if (emailSent && EMAILJS_CONFIG.PUBLIC_KEY !== "YOUR_EMAILJS_PUBLIC_KEY") {
                    successText.innerHTML = `✅ Invoice sent to ${email}! Our team will contact you on WhatsApp within 5 minutes.`;
                } else {
                    successText.innerHTML = `✅ Request sent! Our team will contact you on WhatsApp.`;
                }
                successMsg.style.display = 'flex';
                
                // Store last customer
                localStorage.setItem('lastCustomer', JSON.stringify(customerData));
                
                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = 'thank-you.html';
                }, 3000);

            } catch (error) {
                alert('Something went wrong. Please try again.');
                console.error(error);
            } finally {
                payBtn.disabled = false;
                loading.style.display = 'none';
                payBtn.innerHTML = '<i data-lucide="message-circle" size="18"></i> Request Payment & Get Invoice';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
