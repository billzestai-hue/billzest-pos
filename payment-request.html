<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Request - BillzestPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #ec4899; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .payment-container { background: white; border-radius: 28px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .payment-header { text-align: center; margin-bottom: 30px; }
        .payment-header .icon { background: linear-gradient(135deg, #667eea, #764ba2); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .payment-header h2 { color: #1e293b; margin-bottom: 8px; font-size: 1.8rem; }
        .payment-header p { color: #64748b; }
        .plan-badge { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 8px 20px; border-radius: 30px; display: inline-block; margin-top: 15px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 1rem; transition: all 0.3s; background: #f8fafc; }
        .form-control:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79,70,229,0.1); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-pay { width: 100%; padding: 16px; background: linear-gradient(135deg, #25d366, #128C7E); color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37,211,102,0.3); }
        .btn-pay:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .whatsapp-info { background: #e8f5e9; padding: 15px; border-radius: 16px; margin-top: 25px; text-align: center; border: 1px solid #25d366; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .whatsapp-info p { color: #2e7d32; font-size: 0.85rem; }
        .success-message { background: #d1fae5; color: #065f46; padding: 14px; border-radius: 14px; margin-bottom: 20px; display: none; align-items: center; gap: 10px; }
        .success-message i { flex-shrink: 0; }
        .loading { display: none; width: 20px; height: 20px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .back-link a:hover { color: var(--primary); }
        @media (max-width: 500px) { .payment-container { padding: 25px; } .row-2 { grid-template-columns: 1fr; gap: 0; } }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <div class="icon"><i data-lucide="message-circle" size="36" color="white"></i></div>
            <h2>Complete Your Payment</h2>
            <div class="plan-badge" id="planBadge">Professional Plan - $79/month</div>
        </div>

        <div id="successMsg" class="success-message">
            <i data-lucide="check-circle" size="18"></i>
            <span id="successText"></span>
        </div>

        <form id="paymentForm">
            <div class="row-2">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="phone" class="form-control" required placeholder="+1 234 567 890">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" class="form-control" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Restaurant Name</label>
                <input type="text" id="restaurantName" class="form-control" placeholder="Your Restaurant Name">
            </div>
            <div class="form-group">
                <label>Additional Notes (Optional)</label>
                <textarea id="notes" class="form-control" rows="2" placeholder="Any special requirements?"></textarea>
            </div>
            <button type="submit" class="btn-pay" id="payBtn">
                <i data-lucide="message-circle" size="18"></i>
                Request Payment on WhatsApp
                <div class="loading" id="loading"></div>
            </button>
        </form>

        <div class="whatsapp-info">
            <i data-lucide="shield-check" size="20" color="#25d366"></i>
            <p>Secure payment request via WhatsApp. Our team will contact you within 5 minutes!</p>
        </div>
        
        <div class="back-link">
            <a href="pricing.html">← Back to Pricing</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Get plan info from URL
        const urlParams = new URLSearchParams(window.location.search);
        const planName = urlParams.get('plan') || 'Professional';
        const planPrice = urlParams.get('price') || '79';
        const billingCycle = urlParams.get('billing') || 'monthly';

        document.getElementById('planBadge').innerHTML = `${planName} Plan - $${planPrice}/${billingCycle === 'yearly' ? 'year' : 'month'}`;

        // ========== YAHAN APNA WHATSAPP NUMBER DAALO ==========
        // Country code ke saath, example: 919876543210 (India)
        const ADMIN_WHATSAPP = "919876543210";  // 🔴 CHANGE THIS TO YOUR NUMBER
        
        // ======================================================

        function saveToLocal(customerData) {
            let pendingPayments = JSON.parse(localStorage.getItem('pendingPayments') || '[]');
            pendingPayments.push({
                ...customerData,
                id: Date.now(),
                timestamp: new Date().toISOString(),
                status: 'pending'
            });
            localStorage.setItem('pendingPayments', JSON.stringify(pendingPayments));
        }

        function formatWhatsAppMessage(customerData) {
            return `🆕 *NEW PAYMENT REQUEST* 🆕
━━━━━━━━━━━━━━━━━━━━━━
👤 *Customer:* ${customerData.fullName}
📧 *Email:* ${customerData.email}
📱 *Phone:* ${customerData.phone}
🏪 *Restaurant:* ${customerData.restaurantName || 'Not specified'}
📦 *Plan:* ${customerData.plan}
💰 *Amount:* $${customerData.amount}
🔄 *Billing:* ${customerData.billing}
💬 *Notes:* ${customerData.notes || 'No additional notes'}
⏰ *Time:* ${new Date().toLocaleString()}
━━━━━━━━━━━━━━━━━━━━━━
🔗 *Reply to this message to process payment*
📞 *Contact customer:* ${customerData.phone}

_This is an automated payment request from BillzestPOS_`;
        }

        function sendWhatsAppMessage(message) {
            // Create WhatsApp link
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${ADMIN_WHATSAPP}?text=${encodedMessage}`;
            
            // Open WhatsApp in new tab
            window.open(whatsappUrl, '_blank');
            return true;
        }

        const form = document.getElementById('paymentForm');
        const payBtn = document.getElementById('payBtn');
        const loading = document.getElementById('loading');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const restaurantName = document.getElementById('restaurantName').value;
            const notes = document.getElementById('notes').value;

            if (!fullName || !email || !phone) {
                alert('❌ Please fill all required fields');
                return;
            }

            const customerData = {
                fullName: fullName,
                email: email,
                phone: phone,
                restaurantName: restaurantName || 'Not specified',
                plan: planName,
                amount: planPrice,
                billing: billingCycle,
                notes: notes || 'No additional notes'
            };

            payBtn.disabled = true;
            loading.style.display = 'inline-block';
            payBtn.innerHTML = 'Sending Request...';

            try {
                const message = formatWhatsAppMessage(customerData);
                sendWhatsAppMessage(message);
                
                // Save locally
                saveToLocal(customerData);
                
                successText.innerHTML = `✅ Request sent! Our team will contact you on WhatsApp within 5 minutes.`;
                successMsg.style.display = 'flex';
                
                // Store customer data for reference
                localStorage.setItem('lastPaymentRequest', JSON.stringify(customerData));
                
                // Reset form after 3 seconds and redirect
                setTimeout(() => {
                    form.reset();
                    window.location.href = 'thank-you.html';
                }, 3000);

            } catch (error) {
                alert('Something went wrong. Please try again.');
                console.error(error);
            } finally {
                payBtn.disabled = false;
                loading.style.display = 'none';
                payBtn.innerHTML = '<i data-lucide="message-circle" size="18"></i> Request Payment on WhatsApp';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
