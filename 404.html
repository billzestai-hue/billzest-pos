<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Billzestpos</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; --secondary: #ec4899; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff, #e0e7ff); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; overflow: hidden; }

        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        .shape { position: absolute; border-radius: 50%; filter: blur(100px); }
        .s1 { background: rgba(79,70,229,0.3); width: 500px; height: 500px; top: -200px; right: -100px; }
        .s2 { background: rgba(236,72,153,0.3); width: 400px; height: 400px; bottom: -100px; left: -150px; }

        .content { position: relative; z-index: 1; max-width: 550px; }

        .code-404 { font-size: 10rem; font-weight: 800; line-height: 1; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .icon-wrap { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: var(--primary); box-shadow: 0 20px 40px rgba(79,70,229,0.15); }
        h1 { font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 14px; }
        p { color: #64748b; font-size: 1.05rem; margin-bottom: 36px; line-height: 1.6; }

        .nav-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 14px 28px; border-radius: 12px; font-weight: 600; text-decoration: none; font-size: 0.95rem; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; box-shadow: 0 8px 20px rgba(236,72,153,0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(236,72,153,0.3); }
        .btn-outline { background: white; border: 1.5px solid #cbd5e1; color: #334155; }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <div class="bg-shapes"><div class="shape s1"></div><div class="shape s2"></div></div>

    <div class="content">
        <div class="code-404">404</div>
        <div class="icon-wrap"><i data-lucide="map-pin-off" size="40"></i></div>
        <h1>Oops! Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="nav-links">
            <a href="index.html" class="btn btn-primary"><i data-lucide="home" size="18"></i> Back to Home</a>
            <a href="dashboard.html" class="btn btn-outline"><i data-lucide="layout-dashboard" size="18"></i> Dashboard</a>
            <a href="contact.html" class="btn btn-outline"><i data-lucide="mail" size="18"></i> Contact Us</a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
