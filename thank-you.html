<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - Billzestpos</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; --secondary: #ec4899; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff, #e0e7ff); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }

        .bg-shapes { position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:0; pointer-events:none; }
        .shape { position:absolute; border-radius:50%; filter:blur(100px); }
        .s1 { background:rgba(79,70,229,0.25); width:500px; height:500px; top:-150px; right:-100px; }
        .s2 { background:rgba(236,72,153,0.25); width:400px; height:400px; bottom:-100px; left:-150px; }

        .card { position: relative; z-index: 1; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-radius: 28px; padding: 60px 50px; max-width: 550px; width: 100%; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,1); }

        .check-circle { width: 100px; height: 100px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: white; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 15px 35px rgba(79,70,229,0.3); }
        @keyframes popIn { from { opacity:0; transform:scale(0.3); } to { opacity:1; transform:scale(1); } }

        .confetti { font-size: 2rem; margin-bottom: 10px; animation: wiggle 1s ease 0.6s both; display: block; }
        @keyframes wiggle { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-10deg);} 75%{transform:rotate(10deg);} }

        h1 { font-size: 2.2rem; font-weight: 800; color: #0f172a; margin-bottom: 12px; }
        .subtitle { color: #64748b; font-size: 1rem; line-height: 1.7; margin-bottom: 35px; }

        .info-box { background: rgba(79,70,229,0.05); border: 1px solid rgba(79,70,229,0.15); border-radius: 14px; padding: 20px; margin-bottom: 30px; text-align: left; }
        .info-box h4 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 12px; }
        .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; color: #334155; font-size: 0.95rem; font-weight: 500; }
        .info-row i { color: var(--primary); flex-shrink: 0; }

        .actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 14px 28px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; border: none; cursor: pointer; }
        .btn-primary { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; box-shadow: 0 8px 20px rgba(236,72,153,0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(236,72,153,0.3); }
        .btn-outline { background: white; border: 1.5px solid #e2e8f0; color: #334155; }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        @media(max-width:500px){ .card { padding: 40px 28px; } .actions { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="bg-shapes"><div class="shape s1"></div><div class="shape s2"></div></div>

    <div class="card">
        <span class="confetti">🎉</span>
        <div class="check-circle"><i data-lucide="check" size="48"></i></div>
        <h1 id="pageTitle">Thank You!</h1>
        <p class="subtitle" id="pageSubtitle">Your request has been received successfully. Our team will get back to you within 24 hours.</p>

        <div class="info-box">
            <h4>What's Next?</h4>
            <div class="info-row"><i data-lucide="mail" size="18"></i> Confirmation email sent to your inbox</div>
            <div class="info-row"><i data-lucide="phone" size="18"></i> Our team will call within 24 hours</div>
            <div class="info-row"><i data-lucide="calendar" size="18"></i> Demo scheduled at your convenience</div>
        </div>

        <div class="actions">
            <a href="index.html" class="btn btn-primary"><i data-lucide="home" size="18"></i> Back to Home</a>
            <a href="contact.html" class="btn btn-outline"><i data-lucide="mail" size="18"></i> Contact Us</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        // Customize based on URL params: ?type=demo|contact|payment
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        if (type === 'demo') {
            document.getElementById('pageTitle').textContent = 'Demo Booked! 🚀';
            document.getElementById('pageSubtitle').textContent = 'Your demo request is confirmed! We\'ll reach out shortly to schedule your live walkthrough of Billzestpos.';
        } else if (type === 'payment') {
            document.getElementById('pageTitle').textContent = 'Payment Received! ✅';
            document.getElementById('pageSubtitle').textContent = 'Your payment has been processed successfully. Your invoice will be emailed to you shortly.';
        }
    </script>
</body>
</html>
