<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Billzestpos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; --primary-dark: #4338ca; --secondary: #ec4899; --dark: #0f172a; --light: #f8fafc; --text-gray: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .login-container { display: flex; width: 100%; max-width: 1200px; background: white; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; }

        .login-brand { flex: 1; background: linear-gradient(135deg, #0f172a, #4f46e5); padding: 50px; display: flex; flex-direction: column; justify-content: space-between; color: white; }
        .brand-logo { font-size: 1.8rem; font-weight: 800; display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .brand-logo div { background: white; color: var(--primary); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .brand-text h1 { font-size: 2.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        .brand-text p { color: #cbd5e1; font-size: 1rem; line-height: 1.6; }

        .login-form-section { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .back-to-home { margin-bottom: 30px; display: inline-flex; align-items: center; gap: 8px; color: var(--text-gray); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .back-to-home:hover { color: var(--primary); }

        .form-header { margin-bottom: 35px; }
        .form-header h2 { font-size: 2rem; color: #0f172a; margin-bottom: 10px; font-weight: 800; }
        .form-header p { color: var(--text-gray); }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .form-control { width: 100%; padding: 15px 16px 15px 45px; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 1rem; transition: all 0.3s; background: #f8fafc; }
        .form-control:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .btn-login { width: 100%; padding: 16px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: #94a3b8; font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e2e8f0; }
        .divider span { padding: 0 15px; }

        .btn-google { width: 100%; padding: 14px; background: white; color: #334155; border: 1.5px solid #e2e8f0; border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-1px); }
        .btn-google:disabled { opacity: 0.7; cursor: not-allowed; }

        .signup-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-gray); }
        .signup-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }

        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.85rem; display: none; align-items: center; gap: 8px; }
        .loading-spinner { display: none; width: 20px; height: 20px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) { .login-brand { display: none; } .login-form-section { padding: 40px; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <div class="brand-logo"><div><i data-lucide="store" size="26"></i></div><span>Billzestpos</span></div>
            <div class="brand-text"><h1>Welcome Back!</h1><p>Login to manage your restaurant, track sales, and grow your business.</p></div>
            <div style="font-size: 0.75rem; opacity: 0.6;">© 2026 Billzestpos</div>
        </div>

        <div class="login-form-section">
            <a href="index.html" class="back-to-home"><i data-lucide="arrow-left" size="16"></i> Back to Home</a>
            
            <div class="form-header"><h2>Sign In</h2><p>Enter your credentials to access dashboard</p></div>

            <div class="error-message" id="errorMsg"><i data-lucide="alert-circle" size="16"></i> <span id="errorText"></span></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" size="18"></i>
                        <input type="email" id="email" class="form-control" placeholder="admin@restaurant.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" size="18"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Sign In with Email</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button class="btn-google" id="googleBtn">Continue with Google</button>

            <div class="signup-link">
                Don't have an account? <a href="register.html">Create an account</a>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔥 YOUR FIREBASE CONFIG (UPDATED)
        const firebaseConfig = {
            apiKey: "AIzaSyCN0akvFXOHM6WPHv9ve9noqqmauO3TJRY",
            authDomain: "billzest-pos.firebaseapp.com",
            projectId: "billzest-pos",
            storageBucket: "billzest-pos.firebasestorage.app",
            messagingSenderId: "946546876429",
            appId: "1:946546876429:web:9b4a7aa3cecbf3aea83544",
            measurementId: "G-69WEHH9X5D"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('user', JSON.stringify({
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    photo: user.photoURL,
                    uid: user.uid
                }));
                window.location.href = 'dashboard.html';
            }
        });

        // Email/Password Login
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        function showError(message) {
            errorText.innerText = message;
            errorMsgDiv.style.display = 'flex';
            setTimeout(() => {
                errorMsgDiv.style.display = 'none';
            }, 4000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Signing in... <div class="loading-spinner" style="display:inline-block;"></div>';
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                localStorage.setItem('user', JSON.stringify({
                    email: user.email,
                    name: user.displayName || user.email.split('@')[0],
                    uid: user.uid
                }));
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email format';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'This account has been disabled';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Incorrect password';
                        break;
                    default:
                        errorMessage = error.message;
                }
                showError(errorMessage);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In with Email';
            }
        });

        // Google Login
        const googleBtn = document.getElementById('googleBtn');
        
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleBtn.innerHTML = 'Redirecting to Google...';
            
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                localStorage.setItem('user', JSON.stringify({
                    email: user.email,
                    name: user.displayName,
                    photo: user.photoURL,
                    uid: user.uid
                }));
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/popup-closed-by-user':
                        errorMessage = 'Popup was closed before completing sign in';
                        break;
                    case 'auth/popup-blocked':
                        errorMessage = 'Popup was blocked by browser';
                        break;
                    default:
                        errorMessage = error.message;
                }
                showError(errorMessage);
                googleBtn.disabled = false;
                googleBtn.innerHTML = 'Continue with Google';
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
